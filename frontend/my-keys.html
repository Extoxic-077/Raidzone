<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Keys — Raidzone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <style>
    body { background: var(--bg0); color: var(--text-1); font-family: var(--font-body); min-height: 100vh; }

    .page-header {
      max-width: 900px; margin: 0 auto; padding: 84px 24px 0;
    }
    .page-title { font-family: var(--font-heading); font-size: 2rem; font-weight: 800; margin-bottom: 6px; }
    .page-sub { color: var(--text-3); font-size: 14px; margin-bottom: 32px; }

    .keys-grid {
      max-width: 900px; margin: 0 auto; padding: 0 24px 120px;
      display: grid; grid-template-columns: 1fr; gap: 16px;
    }

    .key-card {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--r-lg); padding: 20px 24px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .key-card-header { display: flex; align-items: center; gap: 14px; }
    .key-card-img {
      width: 52px; height: 52px; border-radius: var(--r-md);
      object-fit: cover; background: var(--bg2);
      flex-shrink: 0;
    }
    .key-card-emoji {
      width: 52px; height: 52px; border-radius: var(--r-md);
      background: var(--bg2); display: flex; align-items: center;
      justify-content: center; font-size: 26px; flex-shrink: 0;
    }
    .key-card-meta { min-width: 0; }
    .key-card-name {
      font-weight: 700; font-size: 15px; color: var(--text-1);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .key-card-date { font-size: 12px; color: var(--text-4); margin-top: 3px; }

    .key-value-wrap {
      background: var(--bg2); border: 1px solid var(--glass-border);
      border-radius: var(--r-md); padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .key-value {
      flex: 1; font-family: var(--font-mono); font-size: 13px;
      color: var(--violet-light); word-break: break-all; line-height: 1.5;
      user-select: all;
    }
    .btn-copy {
      flex-shrink: 0; padding: 6px 14px;
      background: rgba(124,58,237,.2); border: 1px solid rgba(124,58,237,.4);
      border-radius: var(--r-full); color: var(--violet-light);
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn-copy:hover { background: rgba(124,58,237,.35); }
    .btn-copy.copied { background: rgba(34,197,94,.2); border-color: rgba(34,197,94,.4); color: #22c55e; }

    .empty-state {
      max-width: 900px; margin: 60px auto; padding: 0 24px;
      text-align: center; color: var(--text-4);
    }
    .empty-state svg { opacity: .3; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; margin-bottom: 20px; }
    .btn-shop {
      display: inline-block; padding: 10px 28px;
      background: var(--gradient); border-radius: var(--r-full);
      color: #fff; font-weight: 700; font-size: 14px; text-decoration: none;
    }

    .loading-state {
      max-width: 900px; margin: 60px auto; padding: 0 24px;
      text-align: center; color: var(--text-4); font-size: 14px;
    }

    @media (min-width: 640px) {
      .keys-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div id="navbar"></div>

<div class="page-header">
  <h1 class="page-title">My Keys</h1>
  <p class="page-sub">Your purchased digital product keys, decrypted and ready to use.</p>
</div>

<div id="keys-container" class="loading-state">Loading your keys…</div>

<div id="toast-container"></div>

<script src="/js/config.js"></script>
<script type="module">
import { initAuth, isLoggedIn } from './js/auth.js';
import { initNavbar } from './js/components/navbar.js';
import { showToast } from './js/components/toast.js';

await initAuth();
if (!isLoggedIn()) { window.location.href = 'login.html'; }

await initNavbar();

const API = window.__API_BASE__ || '/api/v1';

function authHeaders() {
  const token = sessionStorage.getItem('hv_token');
  return { 'Authorization': `Bearer ${token}` };
}

async function loadKeys() {
  const container = document.getElementById('keys-container');
  try {
    const res = await fetch(`${API}/my-keys`, { headers: authHeaders() });
    const json = await res.json();
    if (!res.ok) throw new Error(json.message || `Error ${res.status}`);
    const keys = json.data || [];

    if (keys.length === 0) {
      container.className = 'empty-state';
      container.innerHTML = `
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3m-3.5 3.5L19 4"/>
        </svg>
        <p>You haven't purchased any products with digital keys yet.</p>
        <a href="catalog.html" class="btn-shop">Browse Products</a>`;
      return;
    }

    container.className = 'keys-grid';
    container.innerHTML = keys.map(k => {
      const thumb = k.imageUrl
        ? `<img class="key-card-img" src="${k.imageUrl}" alt="${escHtml(k.productName)}" loading="lazy"/>`
        : `<div class="key-card-emoji">${k.emoji || '🔑'}</div>`;
      const date = k.assignedAt
        ? new Date(k.assignedAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })
        : '';
      return `
        <div class="key-card">
          <div class="key-card-header">
            ${thumb}
            <div class="key-card-meta">
              <div class="key-card-name">${escHtml(k.productName)}</div>
              ${date ? `<div class="key-card-date">Redeemed ${date}</div>` : ''}
            </div>
          </div>
          <div class="key-value-wrap">
            <span class="key-value" id="kv-${escHtml(k.id)}">${escHtml(k.keyValue)}</span>
            <button class="btn-copy" data-id="${escHtml(k.id)}" data-val="${escAttr(k.keyValue)}">Copy</button>
          </div>
        </div>`;
    }).join('');

    container.querySelectorAll('.btn-copy').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(btn.dataset.val);
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
        } catch {
          showToast('Could not copy to clipboard', 'error');
        }
      });
    });

  } catch (e) {
    container.className = 'empty-state';
    container.innerHTML = `<p style="color:var(--text-3)">Failed to load keys: ${escHtml(e.message)}</p>`;
  }
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s ?? '').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

loadKeys();
</script>
</body>
</html>

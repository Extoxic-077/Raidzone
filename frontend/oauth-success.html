<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signing in… — RAIDZONE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #07070F;
      font-family: 'DM Sans', sans-serif;
      color: #F1F0F7;
    }

    .card {
      text-align: center;
      padding: 48px 40px;
      background: #0F0F1A;
      border: 1px solid #1E1E2E;
      border-radius: 20px;
      max-width: 380px;
      width: 90%;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

    .logo-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
    }

    .status-icon {
      margin-bottom: 16px;
      display: flex;
      justify-content: center;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      color: #9CA3AF;
      line-height: 1.6;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #1E1E2E;
      border-top-color: #7C3AED;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 20px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 28px;
      background: linear-gradient(135deg, #7C3AED, #22D3EE);
      color: #fff;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: none;
    }
  </style>
<link rel="stylesheet" href="/css/rz-header.v5.css?v=5.0.0"></head>
<body>

<div class="card" id="card">
  <svg class="logo-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#C084FC"/>
        <stop offset="100%" stop-color="#22D3EE"/>
      </linearGradient>
    </defs>
    <path d="M14 2L25.26 8.5V21.5L14 28L2.74 21.5V8.5L14 2Z" fill="url(#hg)"/>
    <path d="M14 6L21.26 10.5V19.5L14 24L6.74 19.5V10.5L14 6Z" fill="rgba(7,7,15,0.6)"/>
  </svg>

  <div id="content">
    <div class="spinner"></div>
    <h1 style="margin-top:20px">Signing you in…</h1>
    <p>Please wait while we complete your login.</p>
  </div>
</div>

<script src="/js/config.js"></script>
<script type="module">
import { setAuth } from './js/auth.js';

const params = new URLSearchParams(window.location.search);
const token  = params.get('token');
const isNew  = params.get('new') === 'true';
const name   = params.get('name') || 'there';
const error  = params.get('error');

const content = document.getElementById('content');

if (error) {
  // Show error state
  content.innerHTML = `
    <span class="status-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="1.5" width="48" height="48"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
    <h1>Login Failed</h1>
    <p>${decodeURIComponent(error)}</p>
    <a href="login.html" class="btn">Try Again</a>
  `;
} else if (token) {
  // Save token — build a minimal auth object from the JWT payload
  try {
    const payload   = JSON.parse(atob(token.split('.')[1]));
    const authData  = {
      accessToken: token,
      tokenType:   'Bearer',
      expiresIn:   payload.exp - Math.floor(Date.now() / 1000),
      user: {
        id:    payload.sub,
        email: payload.email || '',
        name:  decodeURIComponent(name),
        role:  payload.role  || 'USER',
      },
    };
    setAuth(authData);

    const firstName = decodeURIComponent(name).split(' ')[0];
    if (isNew) {
      content.innerHTML = `
        <span class="status-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#C084FC" stroke-width="1.5" width="48" height="48"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
        <h1>Welcome, ${firstName}!</h1>
        <p>Your account has been created with RAIDZONE.</p>
        <div class="spinner"></div>
      `;
    } else {
      content.innerHTML = `
        <span class="status-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="1.5" width="48" height="48"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>
        <h1>Welcome back, ${firstName}!</h1>
        <p>You've been signed in successfully.</p>
        <div class="spinner"></div>
      `;
    }

    setTimeout(() => {
      const redirect = sessionStorage.getItem('redirectAfterLogin');
      sessionStorage.removeItem('redirectAfterLogin');
      window.location.href = redirect || 'index.html';
    }, 1500);

  } catch (e) {
    content.innerHTML = `
      <span class="status-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="1.5" width="48" height="48"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
      <h1>Something went wrong</h1>
      <p>Could not process your login. Please try again.</p>
      <a href="login.html" class="btn">Back to Login</a>
    `;
  }
} else {
  content.innerHTML = `
    <span class="status-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="1.5" width="48" height="48"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
    <h1>No token received</h1>
    <p>The OAuth flow did not complete correctly.</p>
    <a href="login.html" class="btn">Back to Login</a>
  `;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Tracking — RAIDZONE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <style>
    .static-page { max-width: 640px; margin: 0 auto; padding: 84px 24px 120px; }
    .static-hero { text-align: center; margin-bottom: 48px; }
    .static-eyebrow { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--violet-light); margin-bottom: 12px; }
    .static-title { font-family: var(--font-heading); font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; margin-bottom: 16px; }
    .static-lead { font-size: 15px; color: var(--text-3); line-height: 1.7; }
    .track-box { background: var(--glass); border: 1px solid var(--glass-border); border-radius: var(--r-lg); padding: 28px; margin-bottom: 24px; }
    .track-box label { display: block; font-size: 12px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .track-input-row { display: flex; gap: 10px; }
    .track-input { flex: 1; padding: 11px 14px; background: var(--bg2); border: 1px solid var(--glass-border); border-radius: var(--r-md); color: var(--text-1); font-size: 14px; outline: none; font-family: var(--font-mono); text-transform: uppercase; }
    .track-input:focus { border-color: var(--primary); }
    .btn-track { padding: 11px 24px; background: var(--gradient); border: none; border-radius: var(--r-full); color: #fff; font-weight: 700; font-size: 14px; cursor: pointer; white-space: nowrap; transition: opacity .15s; }
    .btn-track:hover { opacity: .85; }
    #track-result { margin-top: 20px; }
    .order-status-badge { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .status-CONFIRMED { background: rgba(34,197,94,.15); color: #22c55e; }
    .status-PENDING_PAYMENT { background: rgba(234,179,8,.15); color: #eab308; }
    .status-CANCELLED { background: rgba(239,68,68,.12); color: #ef4444; }
    .order-detail-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--glass-border); font-size: 14px; }
    .order-detail-row:last-child { border-bottom: none; }
    .order-detail-label { color: var(--text-3); }
    .order-detail-val { font-weight: 600; }
    .guest-note { margin-top: 24px; font-size: 13px; color: var(--text-4); text-align: center; }
  </style>
</head>
<body>
<div id="navbar"></div>

<div class="static-page">
  <div class="static-hero">
    <div class="static-eyebrow">Order Tracking</div>
    <h1 class="static-title">Where's my order?</h1>
    <p class="static-lead">Enter your Order ID to see the current status and your digital key delivery.</p>
  </div>

  <div class="track-box">
    <label>Order ID</label>
    <div class="track-input-row">
      <input id="order-id-input" class="track-input" type="text" placeholder="e.g. A1B2C3D4" maxlength="36"/>
      <button class="btn-track" id="track-btn">Track</button>
    </div>
    <div id="track-result"></div>
    <p class="guest-note">Signed in? <a href="orders.html" style="color:var(--violet-light)">View all your orders →</a></p>
  </div>
</div>

<div id="footer"></div>
<div id="toast-container"></div>

<script src="/js/config.js"></script>
<script type="module">
import { isLoggedIn, authFetch } from './js/auth.js';
import { initNavbar } from './js/components/rz-nav.js?v=1.1.0';
import { initFooter } from './js/components/rz-foot.js?v=1.1.0';
import { showToast } from './js/components/toast.js';
await initNavbar();
initFooter();

const API = window.__API_BASE__ || '/api/v1';

document.getElementById('track-btn').addEventListener('click', async () => {
  const raw = document.getElementById('order-id-input').value.trim();
  if (!raw) { showToast('Enter an order ID', 'error'); return; }
  if (!isLoggedIn()) {
    showToast('Sign in to track your order', 'error');
    setTimeout(() => window.location.href = 'login.html?redirect=order-tracking.html', 1500);
    return;
  }
  const result = document.getElementById('track-result');
  result.innerHTML = '<p style="color:var(--text-4);font-size:13px;margin-top:12px">Looking up order…</p>';

  try {
    const res = await authFetch(`${API}/orders`);
    const json = await res.json();
    if (!res.ok) throw new Error(json.message || 'Could not load orders');
    const orders = json.data || [];
    const order = orders.find(o =>
      o.id === raw ||
      o.id.startsWith(raw.toLowerCase()) ||
      o.id.toUpperCase().startsWith(raw.toUpperCase())
    );
    if (!order) {
      result.innerHTML = '<p style="color:var(--text-3);font-size:14px;margin-top:14px">No order found with that ID. Please check and try again.</p>';
      return;
    }
    const statusClass = 'status-' + order.status;
    result.innerHTML = `
      <div style="margin-top:16px">
        <div class="order-detail-row">
          <span class="order-detail-label">Order ID</span>
          <span class="order-detail-val" style="font-family:var(--font-mono);font-size:13px">#${order.id.slice(0,8).toUpperCase()}</span>
        </div>
        <div class="order-detail-row">
          <span class="order-detail-label">Status</span>
          <span class="order-status-badge ${statusClass}">${order.status === 'PENDING_PAYMENT' ? 'Pending Payment' : order.status}</span>
        </div>
        <div class="order-detail-row">
          <span class="order-detail-label">Total</span>
          <span class="order-detail-val">$${Number(order.totalAmount).toLocaleString('en-US')}</span>
        </div>
        <div class="order-detail-row">
          <span class="order-detail-label">Placed</span>
          <span class="order-detail-val">${new Date(order.createdAt).toLocaleDateString('en-US', { day:'numeric', month:'short', year:'numeric' })}</span>
        </div>
        ${order.status === 'CONFIRMED' ? `<div style="margin-top:14px"><a href="my-keys.html" style="color:var(--violet-light);font-size:14px;font-weight:600">View your digital keys →</a></div>` : ''}
      </div>`;
  } catch (e) {
    result.innerHTML = `<p style="color:var(--text-3);font-size:14px;margin-top:14px">${e.message}</p>`;
  }
});

// Pre-fill from URL
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
if (id) { document.getElementById('order-id-input').value = id; document.getElementById('track-btn').click(); }
</script>
</body>
</html>

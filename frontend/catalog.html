<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse Categories — RAIDZONE Market</title>
  <meta name="description" content="Explore our massive catalog of game currencies, accounts, items, and professional boosting services. All regions supported."/>

  <!-- Fonts: preload Syne (primary), load async -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'"/>
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap"/></noscript>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" media="print" onload="this.media='all'"/>

  <!-- CSS -->
  <link rel="stylesheet" href="/css/variables.v5.css?v=11.0.0"/>
  <link rel="stylesheet" href="/css/animations.css?v=11.0.0"/>
  <link rel="stylesheet" href="/css/base.css?v=11.0.0"/>
  <link rel="stylesheet" href="/css/components.v5.css?v=11.0.0"/>
  <link rel="stylesheet" href="/css/pages/catalog.v2.css?v=12.8.0">
<link rel="stylesheet" href="/css/rz-header.v5.css?v=12.8.0"></head>
<body>

  <!-- Navbar mount -->
  <div id="navbar"></div>

  <div class="catalog-page">
    <div class="catalog-layout">

      <!-- ── DESKTOP SIDEBAR ─────────────────────── -->
      <!-- ── SIDEBAR (DYNAMICALY MOUNTED) ── -->
      <aside class="catalog-sidebar">
        <div id="cat-filter-list">
          <!-- JS Renders sidebar-groups here -->
          <div class="skeleton-sidebar"></div>
        </div>
      </aside>

      <!-- ── MAIN CONTENT ────────────────────────── -->
      <main class="catalog-main">

        <!-- Category Hero Header -->
        <div id="category-hero-container"></div>

        <!-- Dynamic Eldorado Tabs -->
        <div class="dynamic-tabs-container" id="game-tabs"></div>
        <div class="sub-tabs-pills" id="sub-tabs-container" style="display:none"></div>

        <!-- Top bar -->
        <div class="catalog-topbar">
          <div class="catalog-search-wrap">
            <span class="search-icon-left">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
              </svg>
            </span>
            <input type="search" id="catalog-search" placeholder="Search products..." autocomplete="off"/>
            <div class="search-spinner" id="search-spinner"></div>
          </div>

          <!-- Item Type & Blueprint filters removed: replaced by dynamic tag chips -->


          <div class="catalog-sort">
            <select id="sort-select" aria-label="Sort products">
              <option value="">Popular</option>
              <option value="newest">Newest</option>
              <option value="price_asc">Cheapest 🔥</option>
              <option value="price_desc">Price: High to Low</option>
              <option value="rating_desc">Best Rated ⭐</option>
              <option value="delivery_fast">Fastest ⚡</option>
            </select>
          </div>

          <div class="view-toggle">
            <button class="view-btn active" data-view="grid" aria-label="Grid view">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
              </svg>
            </button>
            <button class="view-btn" data-view="list" aria-label="List view">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
                <line x1="3" y1="18" x2="3.01" y2="18"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Status bar -->
        <div class="catalog-status-bar">
          <span class="catalog-count" id="product-count">Loading products…</span>
          <button class="catalog-mobile-filter-btn" id="mobile-filter-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/>
            </svg>
            Filters
          </button>
        </div>

        <!-- Product grid -->
        <div class="products-grid" id="products-grid"></div>

        <!-- Infinite scroll sentinel -->
        <div id="scroll-sentinel" style="height:1px"></div>

        <!-- End message -->
        <div class="end-message" id="end-message" style="display:none">
          You have seen all products
        </div>

      </main>
    </div>
  </div>

  <!-- Mobile filter overlay & sheet -->
  <div class="filter-overlay" id="filter-overlay"></div>
  <div class="filter-sheet" id="filter-sheet">
    <div class="filter-sheet-handle"></div>
    <div class="sidebar-header">
      <span class="sidebar-title">Filters</span>
      <button class="clear-all-btn" id="close-filter-sheet">✕ Close</button>
    </div>
    <div id="filter-sheet-content"></div>
  </div>

  <!-- Footer mount -->
  <div id="footer"></div>

  <!-- Bottom nav mount (mobile) -->

  <!-- JS entry -->
  <script src="/js/config.js"></script>
  <script type="module" src="/js/main.v5.js?v=11.0.0"></script>
  <script type="module">
    import { renderCatalog } from '/js/pages/catalog.v5.js?v=15.3.0';
    document.addEventListener('DOMContentLoaded', () => renderCatalog());
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — RAIDZONE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/pages/auth.css"/>

  <style>
    .otp-grid {
      display: flex; gap: 10px; justify-content: center; margin: 20px 0;
    }
    .otp-cell {
      width: 48px; height: 56px; border: 2px solid var(--glass-border);
      border-radius: var(--r-md); background: var(--bg2); color: var(--text-1);
      font-size: 22px; font-weight: 700; font-family: var(--font-mono);
      text-align: center; outline: none; transition: border-color 0.15s, box-shadow 0.15s;
      caret-color: transparent;
    }
    .otp-cell:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,58,237,0.25); }
    .otp-cell.filled { border-color: var(--primary); background: rgba(124,58,237,0.08); }
    .pw-toggle-wrap { position: relative; }
    .pw-toggle-wrap input { padding-right: 44px; }
    .eye-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-3); cursor: pointer; padding: 0;
    }
    .eye-toggle svg { width: 18px; height: 18px; }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <a href="index.html" class="auth-logo">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#C084FC"/>
            <stop offset="100%" stop-color="#22D3EE"/>
          </linearGradient>
        </defs>
        <path d="M14 2L25.26 8.5V21.5L14 28L2.74 21.5V8.5L14 2Z" fill="url(#hg)"/>
        <path d="M14 6L21.26 10.5V19.5L14 24L6.74 19.5V10.5L14 6Z" fill="rgba(7,7,15,0.6)"/>
      </svg>
      <span class="auth-logo-text">RAIDZONE</span>
    </a>

    <!-- Step 1: email -->
    <div id="step-email">
      <h1 class="auth-title">Reset password</h1>
      <p class="auth-subtitle">Enter your email and we'll send you a reset code.</p>

      <form class="auth-form" id="email-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="reset-email">Email address</label>
          <div class="input-wrap">
            <input type="email" id="reset-email" class="form-input"
                   placeholder="you@example.com" autocomplete="email" required/>
          </div>
        </div>
        <div class="form-error-box" id="email-error"></div>
        <button type="submit" class="btn-auth-submit" id="send-btn">
          <div class="btn-spinner"></div>
          <span class="btn-text">Send Reset Code</span>
        </button>
      </form>

      <div class="auth-footer">
        <div class="auth-footer-row">
          Remember your password? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>

    <!-- Step 2: OTP + new password -->
    <div id="step-reset" style="display:none">
      <h1 class="auth-title">Create new password</h1>
      <p class="auth-subtitle" id="reset-hint">Enter the code sent to your email and choose a new password.</p>

      <form class="auth-form" id="reset-form" novalidate>
        <div class="form-group">
          <label class="form-label">Verification Code</label>
          <div class="otp-grid" id="otp-grid">
            <input class="otp-cell" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code"/>
            <input class="otp-cell" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
            <input class="otp-cell" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
            <input class="otp-cell" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
            <input class="otp-cell" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
            <input class="otp-cell" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="new-password">New Password</label>
          <div class="input-wrap password-wrap pw-toggle-wrap">
            <input type="password" id="new-password" class="form-input"
                   placeholder="At least 8 characters" minlength="8" autocomplete="new-password" required/>
            <button type="button" class="eye-toggle" id="pw-toggle" aria-label="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-error-box" id="reset-error"></div>

        <button type="submit" class="btn-auth-submit" id="reset-btn">
          <div class="btn-spinner"></div>
          <span class="btn-text">Reset Password</span>
        </button>
      </form>

      <button class="otp-back-link" id="back-btn">← Back to email</button>
    </div>

    <!-- Step 3: success -->
    <div id="step-success" style="display:none">
      <div style="text-align:center;padding:20px 0">
        <div style="margin-bottom:16px;display:flex;justify-content:center"><svg viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="1.5" width="56" height="56"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
        <h1 class="auth-title">Password reset!</h1>
        <p class="auth-subtitle">Your password has been updated. You can now sign in.</p>
        <a href="login.html" class="btn-auth-submit" style="text-decoration:none;display:block;margin-top:24px">
          <span class="btn-text">Sign In</span>
        </a>
      </div>
    </div>

  </div>
</div>

<div id="toast-container"></div>

<script src="/js/config.js"></script>
<script type="module">
import { showToast } from './js/components/toast.js';

const API = window.__API_BASE__ || '/api/v1';

// ── OTP grid logic ──────────────────────────────────────────────────────────
const cells = document.querySelectorAll('.otp-cell');

cells.forEach((cell, i) => {
  cell.addEventListener('input', e => {
    const v = e.target.value.replace(/\D/g, '');
    cell.value = v.slice(-1);
    cell.classList.toggle('filled', !!cell.value);
    if (cell.value && i < cells.length - 1) cells[i + 1].focus();
    if (getOtpCode().length === 6) document.getElementById('reset-btn').click();
  });
  cell.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !cell.value && i > 0) cells[i - 1].focus();
  });
  cell.addEventListener('paste', e => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
    cells.forEach((c, j) => { c.value = text[j] || ''; c.classList.toggle('filled', !!c.value); });
    cells[Math.min(text.length, cells.length - 1)].focus();
  });
});

function getOtpCode() { return [...cells].map(c => c.value).join(''); }
function clearOtp() { cells.forEach(c => { c.value = ''; c.classList.remove('filled'); }); }

// ── State ───────────────────────────────────────────────────────────────────
let emailValue = '';

// ── Step 1: send reset code ─────────────────────────────────────────────────
document.getElementById('email-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('reset-email').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('email-error').textContent = 'Please enter a valid email.';
    return;
  }
  document.getElementById('email-error').textContent = '';
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  document.querySelector('#send-btn .btn-text').textContent = 'Sending…';

  try {
    await fetch(`${API}/auth/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    emailValue = email;
    const masked = email.charAt(0) + '***@' + email.split('@')[1];
    document.getElementById('reset-hint').textContent =
      `Enter the 6-digit code sent to ${masked} and set your new password.`;
    document.getElementById('step-email').style.display = 'none';
    document.getElementById('step-reset').style.display = 'block';
    cells[0].focus();
  } catch {
    document.getElementById('email-error').textContent = 'Network error — please try again.';
  } finally {
    btn.disabled = false;
    document.querySelector('#send-btn .btn-text').textContent = 'Send Reset Code';
  }
});

// ── Step 2: reset password ──────────────────────────────────────────────────
document.getElementById('reset-form').addEventListener('submit', async e => {
  e.preventDefault();
  const code = getOtpCode();
  const newPassword = document.getElementById('new-password').value;
  const errEl = document.getElementById('reset-error');

  if (code.length !== 6) { errEl.textContent = 'Please enter the 6-digit code.'; return; }
  if (newPassword.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; return; }
  errEl.textContent = '';

  const btn = document.getElementById('reset-btn');
  btn.disabled = true;
  document.querySelector('#reset-btn .btn-text').textContent = 'Resetting…';

  try {
    const res = await fetch(`${API}/auth/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: emailValue, code, newPassword }),
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.message || 'Invalid or expired code.';
      clearOtp(); cells[0].focus();
      return;
    }
    document.getElementById('step-reset').style.display = 'none';
    document.getElementById('step-success').style.display = 'block';
  } catch {
    errEl.textContent = 'Network error — please try again.';
  } finally {
    btn.disabled = false;
    document.querySelector('#reset-btn .btn-text').textContent = 'Reset Password';
  }
});

// ── Back button ─────────────────────────────────────────────────────────────
document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('step-reset').style.display = 'none';
  document.getElementById('step-email').style.display = 'block';
  clearOtp();
});

// ── Password toggle ─────────────────────────────────────────────────────────
document.getElementById('pw-toggle').addEventListener('click', () => {
  const input = document.getElementById('new-password');
  input.type = input.type === 'password' ? 'text' : 'password';
});
</script>
</body>
</html>

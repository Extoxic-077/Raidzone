<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — NexVault</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/pages/orders.css"/>
</head>
<body>

  <div id="navbar"></div>

  <!-- Success banner (shown when ?success=true) -->
  <div id="order-success-banner" style="display:none" class="order-success-banner">
    <span class="order-success-icon">🎉</span>
    <div>
      <strong>Payment confirmed!</strong> Your order is being processed.
    </div>
    <button class="order-success-close" id="success-banner-close" aria-label="Dismiss">×</button>
  </div>

  <div class="orders-page">
    <div class="orders-inner">
      <div class="page-heading">
        <h1 class="page-title">My Orders</h1>
        <p class="page-subtitle">Your purchase history</p>
      </div>
      <div id="orders-root">
        <div class="orders-loading">Loading orders…</div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <div id="bottom-nav"></div>

  <!-- Review modal -->
  <div id="review-modal" style="display:none" aria-modal="true" role="dialog">
    <div class="review-modal-backdrop" id="review-backdrop"></div>
    <div class="review-modal-box">
      <button class="review-modal-close" id="review-close" aria-label="Close">×</button>
      <h3 class="review-modal-title">Leave a Review</h3>
      <p class="review-modal-product" id="review-product-name"></p>
      <div class="review-stars" id="review-stars" role="group" aria-label="Rating">
        <button class="star-btn" data-val="1" aria-label="1 star">★</button>
        <button class="star-btn" data-val="2" aria-label="2 star">★</button>
        <button class="star-btn" data-val="3" aria-label="3 star">★</button>
        <button class="star-btn" data-val="4" aria-label="4 star">★</button>
        <button class="star-btn" data-val="5" aria-label="5 star">★</button>
      </div>
      <textarea id="review-comment" placeholder="Share your experience… (optional)" rows="4"></textarea>
      <button class="btn-review-submit" id="review-submit">Submit Review</button>
    </div>
  </div>

  <style>
    .btn-review {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; font-size: 12px; font-weight: 600;
      background: rgba(124,58,237,.15); border: 1px solid rgba(124,58,237,.3);
      border-radius: 999px; color: var(--violet-light); cursor: pointer;
      transition: background .15s;
    }
    .btn-review:hover { background: rgba(124,58,237,.3); }
    .order-review-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }

    #review-modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .review-modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); }
    .review-modal-box {
      position: relative; background: var(--bg1); border: 1px solid var(--glass-border);
      border-radius: var(--r-xl); padding: 32px; width: 100%; max-width: 440px; margin: 16px;
      z-index: 1;
    }
    .review-modal-close {
      position: absolute; top: 16px; right: 16px; background: none; border: none;
      font-size: 22px; color: var(--text-3); cursor: pointer; line-height: 1;
    }
    .review-modal-title { font-family: var(--font-heading); font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
    .review-modal-product { font-size: 13px; color: var(--violet-light); margin-bottom: 20px; }
    .review-stars { display: flex; gap: 6px; margin-bottom: 16px; }
    .star-btn {
      background: none; border: none; font-size: 28px; cursor: pointer;
      color: var(--text-4); transition: color .1s, transform .1s;
    }
    .star-btn.active, .star-btn.hover { color: #f59e0b; transform: scale(1.15); }
    #review-comment {
      width: 100%; box-sizing: border-box; padding: 10px 14px;
      background: var(--bg2); border: 1px solid var(--glass-border);
      border-radius: var(--r-md); color: var(--text-1); font-size: 14px;
      font-family: var(--font-body); resize: vertical; outline: none;
      margin-bottom: 16px;
    }
    #review-comment:focus { border-color: var(--primary); }
    .btn-review-submit {
      width: 100%; padding: 12px; background: var(--gradient);
      border: none; border-radius: var(--r-full); color: #fff;
      font-weight: 700; font-size: 14px; cursor: pointer; transition: opacity .15s;
    }
    .btn-review-submit:hover { opacity: .85; }
    .btn-review-submit:disabled { opacity: .5; cursor: not-allowed; }
  </style>

<script src="/js/config.js"></script>
<script type="module">
import { initNavbar } from './js/components/navbar.js';
import { initAuth, isLoggedIn } from './js/auth.js';
import { getMyOrders, createReview } from './js/api.js';
import { showToast } from './js/components/toast.js';

await initAuth();
if (!isLoggedIn()) {
  sessionStorage.setItem('redirectAfterLogin', 'orders.html');
  window.location.href = 'login.html';
}
await initNavbar();

// ── Success banner ────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
if (params.get('success') === 'true') {
  const banner = document.getElementById('order-success-banner');
  banner.style.display = 'flex';
  // Auto-hide after 5s
  const timer = setTimeout(() => banner.style.display = 'none', 5000);
  document.getElementById('success-banner-close').addEventListener('click', () => {
    clearTimeout(timer);
    banner.style.display = 'none';
  });
  // Clean URL
  history.replaceState({}, '', 'orders.html');
}

const root = document.getElementById('orders-root');

function fmtPrice(v) {
  return '₹' + Number(v).toLocaleString('en-IN');
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-IN', {
    day: 'numeric', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

const PROVIDER_LABEL = {
  STRIPE:   '💳 Card',
  RAZORPAY: '🇮🇳 UPI/NetBanking',
  COINBASE: '₿ Crypto',
};

function statusBadge(status) {
  const map = {
    CONFIRMED:       'badge-confirmed',
    PROCESSING:      'badge-processing',
    DELIVERED:       'badge-delivered',
    CANCELLED:       'badge-cancelled',
    PENDING_PAYMENT: 'badge-pending-payment',
  };
  const label = status === 'PENDING_PAYMENT' ? 'Pending Payment' : status;
  return `<span class="order-status-badge ${map[status] || 'badge-confirmed'}">${label}</span>`;
}

function orderCardHTML(order) {
  const isPending   = order.status === 'PENDING_PAYMENT';
  const isCancelled = order.status === 'CANCELLED';

  const itemsHtml = order.items.map(item => {
    const thumb = item.imageUrl
      ? `<img src="${item.imageUrl}" alt="${item.productName}" class="oi-img"/>`
      : `<div class="oi-emoji">${item.productEmoji || '🎮'}</div>`;
    return `
      <div class="order-item">
        <div class="oi-thumb">${thumb}</div>
        <div class="oi-info">
          <div class="oi-name">${item.productName}</div>
          <div class="oi-qty">Qty: ${item.quantity} · ${fmtPrice(item.lineTotal)}</div>
        </div>
      </div>`;
  }).join('');

  const couponRow = (order.discountAmount && Number(order.discountAmount) > 0)
    ? `<div class="order-coupon-row">
         <span class="order-coupon-label">🏷️ Promo <span class="order-coupon-code">${order.couponCode || ''}</span></span>
         <span class="order-coupon-saving">−${fmtPrice(order.discountAmount)}</span>
       </div>`
    : '';

  const paymentRow = (!isPending && order.paymentMethod)
    ? `<div class="order-payment-row">
         <span class="order-payment-method">${PROVIDER_LABEL[order.paymentMethod] || order.paymentMethod}</span>
         ${order.paidAt ? `<span class="order-paid-at">${fmtDate(order.paidAt)}</span>` : ''}
       </div>`
    : '';

  return `
    <div class="order-card ${isPending ? 'order-card-pending' : ''} ${isCancelled ? 'order-card-cancelled' : ''}">
      <div class="order-card-header">
        <div class="order-id-wrap">
          <span class="order-id-label">Order</span>
          <span class="order-id">#${order.id.slice(0,8).toUpperCase()}</span>
        </div>
        <div class="order-meta">
          ${statusBadge(order.status)}
          <span class="order-date">${fmtDate(order.createdAt)}</span>
        </div>
      </div>
      <div class="order-items">${itemsHtml}</div>
      ${couponRow}
      ${paymentRow}
      <div class="order-card-footer">
        <div class="order-shipping">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          ${order.shippingName} &nbsp;·&nbsp; ${order.shippingEmail}
        </div>
        <div class="order-footer-right">
          ${order.status === 'CONFIRMED' ? `
          <div class="order-review-btns">
            ${order.items.filter(i => i.productId).map(i =>
              `<button class="btn-review" data-product-id="${i.productId}" data-product-name="${i.productName}">
                ★ Review ${i.productName.split(' ').slice(0,2).join(' ')}
              </button>`
            ).join('')}
          </div>` : ''}
          <div class="order-total">${fmtPrice(order.totalAmount)}</div>
        </div>
      </div>
    </div>`;
}

function renderOrders(orders) {
  const pending   = orders.filter(o => o.status === 'PENDING_PAYMENT');
  const cancelled = orders.filter(o => o.status === 'CANCELLED');
  const active    = orders.filter(o => o.status !== 'PENDING_PAYMENT' && o.status !== 'CANCELLED');

  let html = '';

  // Pending payment banner
  if (pending.length > 0) {
    html += `
      <div class="orders-pending-banner">
        <div class="orders-pending-icon">⏳</div>
        <div class="orders-pending-text">
          <strong>You have ${pending.length} unpaid order${pending.length > 1 ? 's' : ''}</strong>
          <span>Complete payment to confirm your purchase</span>
        </div>
        <a href="checkout.html" class="btn-complete-payment">Complete Payment →</a>
      </div>`;
  }

  // Main confirmed/delivered orders
  if (active.length > 0) {
    html += active.map(orderCardHTML).join('');
  } else if (!pending.length) {
    html += `
      <div class="orders-empty">
        <div class="orders-empty-icon">📦</div>
        <h3>No orders yet</h3>
        <p>Once you make a purchase, your orders will appear here.</p>
        <a href="catalog.html" class="btn-orders-shop">Start Shopping →</a>
      </div>`;
  }

  // Cancelled orders — collapsible section
  if (cancelled.length > 0) {
    html += `
      <div class="orders-cancelled-section" style="margin-top:32px">
        <button class="orders-cancelled-toggle" id="cancelled-toggle" onclick="
          const body = document.getElementById('cancelled-body');
          const btn = document.getElementById('cancelled-toggle');
          const open = body.style.display !== 'none';
          body.style.display = open ? 'none' : 'block';
          btn.textContent = open ? '▶ Cancelled Orders (${cancelled.length})' : '▼ Cancelled Orders (${cancelled.length})';
        ">▶ Cancelled Orders (${cancelled.length})</button>
        <div id="cancelled-body" style="display:none;margin-top:12px">
          ${cancelled.map(orderCardHTML).join('')}
        </div>
      </div>`;
  }

  root.innerHTML = html;
}

try {
  const orders = await getMyOrders();
  renderOrders(orders);
} catch (err) {
  root.innerHTML = `<div class="orders-error">${err.message}</div>`;
}

// ── Review modal ──────────────────────────────────────────────────────────────
let reviewProductId = null;
let selectedRating  = 0;

function openReviewModal(productId, productName) {
  reviewProductId = productId;
  selectedRating  = 0;
  document.getElementById('review-product-name').textContent = productName;
  document.getElementById('review-comment').value = '';
  document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('review-modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeReviewModal() {
  document.getElementById('review-modal').style.display = 'none';
  document.body.style.overflow = '';
}

document.getElementById('review-close').addEventListener('click', closeReviewModal);
document.getElementById('review-backdrop').addEventListener('click', closeReviewModal);

const stars = document.querySelectorAll('.star-btn');
stars.forEach(btn => {
  btn.addEventListener('mouseenter', () => {
    stars.forEach(s => s.classList.toggle('hover', Number(s.dataset.val) <= Number(btn.dataset.val)));
  });
  btn.addEventListener('mouseleave', () => {
    stars.forEach(s => s.classList.remove('hover'));
  });
  btn.addEventListener('click', () => {
    selectedRating = Number(btn.dataset.val);
    stars.forEach(s => s.classList.toggle('active', Number(s.dataset.val) <= selectedRating));
  });
});

document.getElementById('review-submit').addEventListener('click', async () => {
  if (!selectedRating) { showToast('Please select a star rating', 'error'); return; }
  const comment = document.getElementById('review-comment').value.trim();
  const btn = document.getElementById('review-submit');
  btn.disabled = true; btn.textContent = 'Submitting…';
  try {
    await createReview(reviewProductId, { rating: selectedRating, comment: comment || null });
    showToast('Review submitted! Thank you.', 'success');
    closeReviewModal();
  } catch (e) {
    showToast(e.message || 'Could not submit review', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Submit Review';
  }
});

// Event delegation for review buttons in order cards
root.addEventListener('click', e => {
  const btn = e.target.closest('.btn-review');
  if (btn) openReviewModal(btn.dataset.productId, btn.dataset.productName);
});
</script>

</body>
</html>

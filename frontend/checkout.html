<!DOCTYPE html>
<html lang="en">

<script src="/js/config.js"></script>
<script type="module">
import { showToast }    from './js/components/toast.js';
import { initAuth, isLoggedIn, getUser } from './js/auth.js';
import {
  getCart, getMe, createOrder,
  applyCoupon,
  createStripeIntent,
  createRazorpayOrder, verifyRazorpayPayment,
} from './js/api.js';

await initAuth();
if (!isLoggedIn()) {
  sessionStorage.setItem('redirectAfterLogin', 'checkout.html');
  window.location.href = 'login.html';
}

// ── URL coupon param ──────────────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const urlCoupon = urlParams.get('coupon');

// ── Module state ──────────────────────────────────────────────────────────────
let step         = 1;
let cart         = null;
let profile      = null;
let totals       = null;
let couponData   = null;   // CouponApplyResponse | null
let activeTab    = 'stripe';
let stripeInst   = null;   // Stripe instance
let cardElement  = null;   // Stripe card element

const body = document.getElementById('checkout-body');

// ── Step indicator ────────────────────────────────────────────────────────────
function setStep(n) {
  step = n;
  [1, 2].forEach(i => {
    const el = document.getElementById(`step-ind-${i}`);
    el.classList.toggle('active',    i === n);
    el.classList.toggle('completed', i < n);
  });
  if (n === 1) renderStep1();
  else         renderPayment();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(v) { return '₹' + Number(v).toLocaleString('en-IN'); }

function humanizeError(msg) {
  if (!msg) return 'An unexpected error occurred. Please try again.';
  const m = msg.toLowerCase();
  if (m.includes('card was declined') || m.includes('card_declined'))
    return 'Your card was declined. Please try a different card or contact your bank.';
  if (m.includes('insufficient_funds') || m.includes('insufficient funds'))
    return 'Insufficient funds. Please check your balance or use a different card.';
  if (m.includes('incorrect_cvc') || m.includes('security code') || m.includes('cvc'))
    return 'The security code (CVV/CVC) you entered is incorrect.';
  if (m.includes('expired_card') || m.includes('expir'))
    return 'Your card has expired. Please use a different card.';
  if (m.includes('incorrect_number') || m.includes('invalid card number') || m.includes('card number'))
    return 'The card number you entered is invalid.';
  if (m.includes('processing_error') || m.includes('processing error'))
    return 'A processing error occurred. Please wait a moment and try again.';
  if (m.includes('authentication') || m.includes('3d secure') || m.includes('requires_action'))
    return 'Additional authentication required. Please complete the verification step.';
  if (m.includes('network') || m.includes('connection') || m.includes('timeout') || m.includes('failed to fetch'))
    return 'Network error — please check your connection and try again.';
  if (m.includes('signature') || m.includes('verification failed'))
    return 'Payment verification failed. Please contact support if the issue persists.';
  if (m.includes('razorpay') || m.includes('not configured'))
    return 'This payment method is temporarily unavailable. Please use a different method.';
  return msg;
}

function computeTotals(c) {
  let originalTotal = 0;
  c.items.forEach(item => {
    const op = (item.originalPrice && Number(item.originalPrice) > Number(item.price))
      ? Number(item.originalPrice) : Number(item.price);
    originalTotal += op * item.quantity;
  });
  const subtotal    = Number(c.subtotal);
  const discount    = Math.max(0, originalTotal - subtotal);
  const discountPct = originalTotal > subtotal ? Math.round(discount / originalTotal * 100) : 0;
  return { originalTotal, subtotal, discount, discountPct };
}

function grandTotal() {
  if (!totals) return 0;
  const sub = totals.subtotal - (couponData ? Number(couponData.discountAmount) : 0);
  return Math.max(0, sub);
}

function cartItemRow(item) {
  const thumb = item.imageUrl
    ? `<img src="${item.imageUrl}" alt="${item.name}" class="co-thumb-img"/>`
    : `<div class="co-thumb-emoji">${item.imageEmoji || '🎮'}</div>`;
  const hasDiscount = item.originalPrice && Number(item.originalPrice) > Number(item.price);
  const discPct     = hasDiscount ? Math.round((1 - item.price / item.originalPrice) * 100) : 0;
  const origLine    = hasDiscount ? Number(item.originalPrice) * item.quantity : null;
  return `
    <div class="co-item">
      <div class="co-thumb">${thumb}</div>
      <div class="co-item-info">
        <div class="co-item-name">${item.name}</div>
        <div class="co-item-qty">Qty: ${item.quantity} · ${fmt(item.price)} each</div>
      </div>
      <div class="co-item-price-col">
        <div class="co-item-total">${fmt(item.lineTotal)}</div>
        ${hasDiscount ? `<div class="co-item-orig-total">${fmt(origLine)}</div>
          <span class="co-disc-badge">-${discPct}%</span>` : ''}
      </div>
    </div>`;
}

// ── Right column summary (shared by step 1 and step 2) ───────────────────────
function summaryHTML() {
  const sub     = totals ? totals.subtotal : 0;
  const cpnDisc = couponData ? Number(couponData.discountAmount) : 0;
  const grand   = Math.max(0, sub - cpnDisc);

  return `
    <div class="co-summary">
      ${totals && totals.discount > 0 ? `
        <div class="co-summary-row">
          <span>Original price</span>
          <span class="co-orig-val">${fmt(totals.originalTotal)}</span>
        </div>
        <div class="co-summary-row">
          <span>Discount <span class="co-disc-pct-badge">-${totals.discountPct}%</span></span>
          <span class="co-discount-val">-${fmt(totals.discount)}</span>
        </div>` : ''}
      <div class="co-summary-row">
        <span>Subtotal (${cart ? cart.totalItems : 0} items)</span>
        <span>${fmt(sub)}</span>
      </div>
      ${couponData ? `
        <div class="co-summary-row" style="color:#22D3EE">
          <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13" style="vertical-align:middle;margin-right:3px"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg> Promo (${couponData.code})</span>
          <span style="font-family:var(--font-mono);font-weight:600">−${fmt(cpnDisc)}</span>
        </div>` : ''}
      <div class="co-summary-row">
        <span>Delivery</span><span class="text-success">Free</span>
      </div>
      <div class="co-summary-divider"></div>
      <div class="co-summary-row co-total">
        <span>Total</span>
        <span style="font-family:var(--font-mono)">${fmt(grand)}</span>
      </div>
    </div>`;
}

// ── STEP 1: Review Cart ───────────────────────────────────────────────────────
async function renderStep1() {
  body.innerHTML = '<div class="co-loading">Loading cart…</div>';
  try {
    cart = await getCart();
  } catch (err) {
    body.innerHTML = `<div class="co-error"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="vertical-align:middle;margin-right:4px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> ${err.message}</div>`;
    return;
  }

  if (!cart.items || cart.items.length === 0) {
    body.innerHTML = `
      <div class="co-empty">
        <div class="co-empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div>
        <p>Your cart is empty.</p>
        <a href="catalog.html" class="btn-co-primary">Browse Products</a>
      </div>`;
    return;
  }

  totals = computeTotals(cart);

  // Re-validate URL coupon with actual cart total
  if (urlCoupon && !couponData) {
    try {
      couponData = await applyCoupon(urlCoupon, totals.subtotal);
    } catch { couponData = null; }
  }

  const grand = grandTotal();

  body.innerHTML = `
    <div class="co-layout">
      <div class="co-card co-left">
        <div class="co-col-title">Review your order</div>
        <div class="co-items-list">
          ${cart.items.map(cartItemRow).join('')}
        </div>
      </div>
      <div class="co-card co-right">
        ${couponData ? `<div class="co-savings-banner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="vertical-align:middle;margin-right:4px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Coupon ${couponData.code} — saving ${fmt(couponData.discountAmount)}!</div>` : ''}
        ${summaryHTML()}
        <div class="co-spacer"></div>
        <div class="co-actions">
          <a href="cart.html" class="btn-co-ghost">← Cart</a>
          <button class="btn-co-primary" id="next-to-pay">Continue to Payment</button>
        </div>
      </div>
    </div>`;

  document.getElementById('next-to-pay').addEventListener('click', () => setStep(2));
}

// ── STEP 2: Payment tabs ──────────────────────────────────────────────────────

function loadRazorpayScript() {
  if (document.getElementById('rzp-script')) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.id = 'rzp-script';
    s.src = 'https://checkout.razorpay.com/v1/checkout.js';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

function payTabsHTML() {
  return `
    <div class="payment-tabs" id="payment-tabs">
      <button class="pay-tab ${activeTab==='stripe'    ? 'active':''}" data-tab="stripe"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="vertical-align:middle;margin-right:4px"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Card</button>
      <button class="pay-tab ${activeTab==='razorpay'  ? 'active':''}" data-tab="razorpay"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="vertical-align:middle;margin-right:4px"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>UPI / NetBanking</button>
      <button class="pay-tab ${activeTab==='coinbase'  ? 'active':''}" data-tab="coinbase"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="vertical-align:middle;margin-right:4px"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>Crypto</button>
    </div>`;
}

function stripeTabHTML() {
  return `
    <div class="pay-panel" id="panel-stripe">
      <div class="pay-section-label">Card Details</div>
      <div class="stripe-mount-wrap">
        <div id="stripe-card-element"></div>
      </div>
      <div class="stripe-card-logos">
        <span>Visa</span><span>Mastercard</span><span>RuPay</span><span>Amex</span>
      </div>
      <div class="pay-error" id="stripe-error" hidden></div>
      <div class="stripe-lock-note"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12" style="vertical-align:middle;margin-right:3px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Secured by Stripe · Card details are never stored on our servers</div>

      <div class="upi-badges">

        <span class="upi-badge"><span class="upi-badge-icon">🏦</span>NetBanking</span>

function coinbaseTabHTML() {

        </div>
      </div>

      <button class="btn-pay-tab btn-pay-coinbase" id="coinbase-pay-btn" disabled

async function renderPayment() {
  body.innerHTML = '<div class="co-loading">Preparing payment…</div>';

  if (!profile) {
    try { profile = await getMe(); } catch { profile = getUser(); }
  }
  if (!totals) totals = computeTotals(cart);

  body.innerHTML = `
    <div class="co-layout">
      <div class="co-card co-left">
        <div class="co-col-title">Payment Method</div>
        ${payTabsHTML()}
        <div class="pay-panels-wrap" id="pay-panels">
          ${stripeTabHTML()}
          ${razorpayTabHTML()}
          ${coinbaseTabHTML()}
        </div>
        <div class="co-spacer" style="min-height:8px"></div>
        <button class="btn-co-ghost" id="back-to-review" style="align-self:flex-start;margin-top:8px">← Back to Review</button>
      </div>
      <div class="co-card co-right">
        <div class="nvpay-secure-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="vertical-align:middle;margin-right:4px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span>256-bit SSL · Encrypted Checkout</span></div>
        <div class="co-col-title" style="font-size:0.9rem;margin-bottom:10px">Order Summary</div>
        ${summaryHTML()}
        <div class="pay-disclaimer" style="margin-top:10px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          By proceeding you agree to the
          <a href="#" class="disclaimer-link">Terms of Sale</a> &amp;
          <a href="#" class="disclaimer-link">Privacy Policy</a>.
        </div>
      </div>
    </div>`;

  // ── Tab switching ─────────────────────────────────────────────────────────
  document.getElementById('payment-tabs').addEventListener('click', async e => {
    const btn = e.target.closest('.pay-tab');
    if (!btn) return;
    const tab = btn.dataset.tab;
    if (tab === activeTab) return;

    activeTab = tab;
    document.querySelectorAll('.pay-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.pay-panel').forEach(p => {
      const show = p.id === `panel-${tab}`;
      p.classList.toggle('hidden', !show);
      if (show) p.classList.add('pay-panel-anim');
    });

    if (tab === 'stripe' && !cardElement) mountStripeElement();
    if (tab === 'razorpay') loadRazorpayScript().catch(() => {});
  });

  document.getElementById('back-to-review').addEventListener('click', () => setStep(1));

  // ── Stripe element mount ──────────────────────────────────────────────────
  if (activeTab === 'stripe') mountStripeElement();

  // ── Stripe pay ────────────────────────────────────────────────────────────
  document.getElementById('stripe-pay-btn').addEventListener('click', async () => {
    await handleStripePay();
  });

  // ── Razorpay pay ──────────────────────────────────────────────────────────
  document.getElementById('razorpay-pay-btn').addEventListener('click', async () => {
    await handleRazorpayPay();
  });

}
// handleCoinbasePay removed — Coinbase Commerce API shut down

// ── Stripe card element ───────────────────────────────────────────────────────
async function mountStripeElement() {
  if (!window.Stripe) return;
  if (cardElement) return; // already mounted

  try {
    // Fetch the real publishable key from the backend (no auth required)
    const res  = await fetch('/api/v1/payments/stripe/config');
    const json = await res.json();
    const publishableKey = json?.data?.publishableKey;

    if (!publishableKey || publishableKey.includes('placeholder')) {
      console.warn('Stripe not configured — card element hidden');
      const wrap = document.getElementById('stripe-card-element');
      if (wrap) wrap.closest('.stripe-mount-wrap').innerHTML =
        '<p style="color:var(--text-4);font-size:13px;padding:12px 0">Card payment is temporarily unavailable. Please use UPI/Razorpay.</p>';
      return;
    }

    stripeInst  = Stripe(publishableKey);
    const elements = stripeInst.elements();
    cardElement = elements.create('card', {
      style: {
        base: {
          color:           '#F1F0F7',
          fontFamily:      '"DM Sans", sans-serif',
          fontSize:        '14px',
          fontSmoothing:   'antialiased',
          '::placeholder': { color: '#6B7280' },
          iconColor:       '#7C3AED',
        },
        invalid: { color: '#EC4899', iconColor: '#EC4899' },
      },
    });
    const mount = document.getElementById('stripe-card-element');
    if (mount) cardElement.mount(mount);
  } catch (e) {
    console.warn('Stripe mount error:', e.message);
  }
}

// ── Create order helper ───────────────────────────────────────────────────────
async function createOrderFromCart() {
  return createOrder({
    name:       profile?.name  || '',
    email:      profile?.email || '',
    phone:      profile?.phone || null,
    address:    null,
    couponCode: couponData ? couponData.code : null,
  });
}

// ── Stripe payment flow ───────────────────────────────────────────────────────
async function handleStripePay() {
  const btn   = document.getElementById('stripe-pay-btn');
  const errEl = document.getElementById('stripe-error');

  btn.disabled = true;
  btn.innerHTML = '<span class="pay-spinner"></span> Processing…';
  errEl.hidden  = true;

  try {
    if (!stripeInst || !cardElement) {
      throw new Error('Card element not ready. Please refresh and try again.');
    }

    // 1. Create order
    const order = await createOrderFromCart();

    // 2. Create Stripe intent — clientSecret only; publishableKey already loaded at mount
    const intent = await createStripeIntent(order.id);

    // 3. Confirm payment using the already-mounted card element (preserves user's card data)
    const result = await stripeInst.confirmCardPayment(intent.clientSecret, {
      payment_method: { card: cardElement },
    });

    if (result.error) {
      errEl.textContent = humanizeError(result.error.message);
      errEl.hidden = false;
      btn.disabled = false;
      btn.textContent = `Pay ${fmt(grandTotal())} →`;
      return;
    }

    // 5. Success — redirect after 1 s (webhook will confirm DB)
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="vertical-align:middle;margin-right:4px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Payment confirmed! Redirecting…';
    setTimeout(() => {
      window.location.href = `orders.html?success=true&orderId=${order.id}`;
    }, 1000);

  } catch (err) {
    errEl.textContent = humanizeError(err.message);
    errEl.hidden  = false;
    btn.disabled  = false;
    btn.textContent = `Pay ${fmt(grandTotal())} →`;
    showToast(humanizeError(err.message), 'error');
  }
}

// ── Razorpay payment flow ─────────────────────────────────────────────────────
async function handleRazorpayPay() {
  const btn   = document.getElementById('razorpay-pay-btn');
  const errEl = document.getElementById('rzp-error');

  btn.disabled = true;
  btn.innerHTML = '<span class="pay-spinner"></span> Opening Razorpay…';
  errEl.hidden  = true;

  try {
    await loadRazorpayScript();

    const order   = await createOrderFromCart();
    const rzpData = await createRazorpayOrder(order.id);

    const options = {
      key:         rzpData.keyId,
      amount:      rzpData.amountInPaise,
      currency:    rzpData.currency,
      name:        'NexVault',
      description: 'Digital Goods',
      order_id:    rzpData.razorpayOrderId,
      prefill: {
        name:  profile?.name  || '',
        email: profile?.email || '',
        contact: profile?.phone || '',
      },
      theme: { color: '#7C3AED' },
      handler: async function(response) {
        try {
          await verifyRazorpayPayment(
            order.id,
            response.razorpay_order_id,
            response.razorpay_payment_id,
            response.razorpay_signature
          );
          window.location.href = `orders.html?success=true&orderId=${order.id}`;
        } catch (verifyErr) {
          showToast(humanizeError(verifyErr.message), 'error');
          btn.disabled = false;
          btn.textContent = `Pay ${fmt(grandTotal())} with Razorpay →`;
        }
      },
      modal: {
        ondismiss: function() {
          showToast('Payment cancelled', 'info');
          btn.disabled = false;
          btn.textContent = `Pay ${fmt(grandTotal())} with Razorpay →`;
        }
      }
    };

    const rzp = new window.Razorpay(options);
    rzp.open();

  } catch (err) {
    errEl.textContent = humanizeError(err.message);
    errEl.hidden  = false;
    btn.disabled  = false;
    btn.textContent = `Pay ${fmt(grandTotal())} with Razorpay →`;
    showToast(humanizeError(err.message), 'error');
  }
}


// ── Boot ──────────────────────────────────────────────────────────────────────
setStep(1);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout — NexVault</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/pages/checkout.css"/>

  <!-- Stripe.js loaded in head so it's available when the Card tab is shown -->
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>

  <header class="co-topbar">
    <a href="index.html" class="co-topbar-logo">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" width="26" height="26">
        <defs>
          <linearGradient id="hg-tb" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#C084FC"/>
            <stop offset="100%" stop-color="#22D3EE"/>
          </linearGradient>
        </defs>
        <path d="M14 2L25.26 8.5V21.5L14 28L2.74 21.5V8.5L14 2Z" fill="url(#hg-tb)"/>
        <path d="M14 6L21.26 10.5V19.5L14 24L6.74 19.5V10.5L14 6Z" fill="rgba(7,7,15,0.6)"/>
      </svg>
      NexVault <span>Pay</span>
    </a>
  </header>

  <div class="checkout-page">
    <div class="checkout-inner">

      <div class="checkout-steps" id="checkout-steps">
        <div class="checkout-step active" id="step-ind-1">
          <div class="step-circle">1</div>
          <span>Review Cart</span>
        </div>
        <div class="checkout-step-line" id="step-line"></div>
        <div class="checkout-step" id="step-ind-2">
          <div class="step-circle">2</div>
          <span>Payment</span>
        </div>
      </div>

      <div id="checkout-body"></div>

    </div>
  </div>

  <div id="toast-container"></div>

<script src="/js/config.js"></script>
<script type="module">
import { showToast }    from './js/components/toast.js';
import { initAuth, isLoggedIn, getUser } from './js/auth.js';
import {
  getCart, getMe, createOrder,
  applyCoupon,
  createStripeIntent,
  createRazorpayOrder, verifyRazorpayPayment,
  createCoinbaseCharge, pollOrderStatus,
} from './js/api.js';

await initAuth();
if (!isLoggedIn()) {
  sessionStorage.setItem('redirectAfterLogin', 'checkout.html');
  window.location.href = 'login.html';
}

// ── URL coupon param ──────────────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const urlCoupon = urlParams.get('coupon');

// ── Module state ──────────────────────────────────────────────────────────────
let step         = 1;
let cart         = null;
let profile      = null;
let totals       = null;
let couponData   = null;   // CouponApplyResponse | null
let activeTab    = 'stripe';
let stripeInst   = null;   // Stripe instance
let cardElement  = null;   // Stripe card element
let pollTimer    = null;   // Coinbase polling interval

const body = document.getElementById('checkout-body');

// ── Step indicator ────────────────────────────────────────────────────────────
function setStep(n) {
  step = n;
  [1, 2].forEach(i => {
    const el = document.getElementById(`step-ind-${i}`);
    el.classList.toggle('active',    i === n);
    el.classList.toggle('completed', i < n);
  });
  if (n === 1) renderStep1();
  else         renderPayment();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(v) { return '₹' + Number(v).toLocaleString('en-IN'); }

function computeTotals(c) {
  let originalTotal = 0;
  c.items.forEach(item => {
    const op = (item.originalPrice && Number(item.originalPrice) > Number(item.price))
      ? Number(item.originalPrice) : Number(item.price);
    originalTotal += op * item.quantity;
  });
  const subtotal    = Number(c.subtotal);
  const discount    = Math.max(0, originalTotal - subtotal);
  const discountPct = originalTotal > subtotal ? Math.round(discount / originalTotal * 100) : 0;
  return { originalTotal, subtotal, discount, discountPct };
}

function grandTotal() {
  if (!totals) return 0;
  const sub = totals.subtotal - (couponData ? Number(couponData.discountAmount) : 0);
  return Math.max(0, sub);
}

function cartItemRow(item) {
  const thumb = item.imageUrl
    ? `<img src="${item.imageUrl}" alt="${item.name}" class="co-thumb-img"/>`
    : `<div class="co-thumb-emoji">${item.imageEmoji || '🎮'}</div>`;
  const hasDiscount = item.originalPrice && Number(item.originalPrice) > Number(item.price);
  const discPct     = hasDiscount ? Math.round((1 - item.price / item.originalPrice) * 100) : 0;
  const origLine    = hasDiscount ? Number(item.originalPrice) * item.quantity : null;
  return `
    <div class="co-item">
      <div class="co-thumb">${thumb}</div>
      <div class="co-item-info">
        <div class="co-item-name">${item.name}</div>
        <div class="co-item-qty">Qty: ${item.quantity} · ${fmt(item.price)} each</div>
      </div>
      <div class="co-item-price-col">
        <div class="co-item-total">${fmt(item.lineTotal)}</div>
        ${hasDiscount ? `<div class="co-item-orig-total">${fmt(origLine)}</div>
          <span class="co-disc-badge">-${discPct}%</span>` : ''}
      </div>
    </div>`;
}

// ── Right column summary (shared by step 1 and step 2) ───────────────────────
function summaryHTML() {
  const sub     = totals ? totals.subtotal : 0;
  const cpnDisc = couponData ? Number(couponData.discountAmount) : 0;
  const grand   = Math.max(0, sub - cpnDisc);

  return `
    <div class="co-summary">
      ${totals && totals.discount > 0 ? `
        <div class="co-summary-row">
          <span>Original price</span>
          <span class="co-orig-val">${fmt(totals.originalTotal)}</span>
        </div>
        <div class="co-summary-row">
          <span>Discount <span class="co-disc-pct-badge">-${totals.discountPct}%</span></span>
          <span class="co-discount-val">-${fmt(totals.discount)}</span>
        </div>` : ''}
      <div class="co-summary-row">
        <span>Subtotal (${cart ? cart.totalItems : 0} items)</span>
        <span>${fmt(sub)}</span>
      </div>
      ${couponData ? `
        <div class="co-summary-row" style="color:#22D3EE">
          <span>🏷️ Promo (${couponData.code})</span>
          <span style="font-family:var(--font-mono);font-weight:600">−${fmt(cpnDisc)}</span>
        </div>` : ''}
      <div class="co-summary-row">
        <span>Delivery</span><span class="text-success">Free</span>
      </div>
      <div class="co-summary-divider"></div>
      <div class="co-summary-row co-total">
        <span>Total</span>
        <span style="font-family:var(--font-mono)">${fmt(grand)}</span>
      </div>
    </div>`;
}

// ── STEP 1: Review Cart ───────────────────────────────────────────────────────
async function renderStep1() {
  body.innerHTML = '<div class="co-loading">Loading cart…</div>';
  try {
    cart = await getCart();
  } catch (err) {
    body.innerHTML = `<div class="co-error">⚠️ ${err.message}</div>`;
    return;
  }

  if (!cart.items || cart.items.length === 0) {
    body.innerHTML = `
      <div class="co-empty">
        <div class="co-empty-icon">🛒</div>
        <p>Your cart is empty.</p>
        <a href="catalog.html" class="btn-co-primary">Browse Products</a>
      </div>`;
    return;
  }

  totals = computeTotals(cart);

  // Re-validate URL coupon with actual cart total
  if (urlCoupon && !couponData) {
    try {
      couponData = await applyCoupon(urlCoupon, totals.subtotal);
    } catch { couponData = null; }
  }

  const grand = grandTotal();

  body.innerHTML = `
    <div class="co-layout">
      <div class="co-card co-left">
        <div class="co-col-title">Review your order</div>
        <div class="co-items-list">
          ${cart.items.map(cartItemRow).join('')}
        </div>
      </div>
      <div class="co-card co-right">
        ${couponData ? `<div class="co-savings-banner">🎉 Coupon ${couponData.code} — saving ${fmt(couponData.discountAmount)}!</div>` : ''}
        ${summaryHTML()}
        <div class="co-spacer"></div>
        <div class="co-actions">
          <a href="cart.html" class="btn-co-ghost">← Cart</a>
          <button class="btn-co-primary" id="next-to-pay">Continue to Payment</button>
        </div>
      </div>
    </div>`;

  document.getElementById('next-to-pay').addEventListener('click', () => setStep(2));
}

// ── STEP 2: Payment tabs ──────────────────────────────────────────────────────

function loadRazorpayScript() {
  if (document.getElementById('rzp-script')) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.id = 'rzp-script';
    s.src = 'https://checkout.razorpay.com/v1/checkout.js';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

function payTabsHTML() {
  return `
    <div class="payment-tabs" id="payment-tabs">
      <button class="pay-tab ${activeTab==='stripe'    ? 'active':''}" data-tab="stripe">💳 Card</button>
      <button class="pay-tab ${activeTab==='razorpay'  ? 'active':''}" data-tab="razorpay">🇮🇳 UPI / NetBanking</button>
      <button class="pay-tab ${activeTab==='coinbase'  ? 'active':''}" data-tab="coinbase">₿ Crypto</button>
    </div>`;
}

function stripeTabHTML() {
  return `
    <div class="pay-panel" id="panel-stripe">
      <div class="pay-section-label">Card Details</div>
      <div class="stripe-mount-wrap">
        <div id="stripe-card-element"></div>
      </div>
      <div class="stripe-card-logos">
        <span>Visa</span><span>Mastercard</span><span>RuPay</span><span>Amex</span>
      </div>
      <div class="pay-error" id="stripe-error" hidden></div>
      <div class="stripe-lock-note">🔒 Secured by Stripe · Card details are never stored on our servers</div>
      <button class="btn-pay-tab" id="stripe-pay-btn">Pay ${fmt(grandTotal())} →</button>
    </div>`;
}

function razorpayTabHTML() {
  return `
    <div class="pay-panel hidden" id="panel-razorpay">
      <div class="rzp-note">Razorpay checkout modal will open — pay via UPI, card, netbanking or wallet.</div>
      <div class="upi-badges">
        <span class="upi-badge"><span class="upi-badge-icon">💳</span>Cards</span>
        <span class="upi-badge"><span class="upi-badge-icon">📱</span>UPI</span>
        <span class="upi-badge"><span class="upi-badge-icon">🏦</span>NetBanking</span>
        <span class="upi-badge"><span class="upi-badge-icon">👛</span>Wallet</span>
      </div>
      <div class="pay-security-note">🔒 Autocomplete disabled to enhance security</div>
      <div class="pay-error" id="rzp-error" hidden></div>
      <button class="btn-pay-tab btn-pay-razorpay" id="razorpay-pay-btn">Pay ${fmt(grandTotal())} with Razorpay →</button>
    </div>`;
}

function coinbaseTabHTML() {
  return `
    <div class="pay-panel hidden" id="panel-coinbase">
      <div class="pay-section-label">Accepted Cryptocurrencies</div>
      <div class="crypto-coins-row">
        <div class="crypto-coin">₿<br/><span>Bitcoin</span><small>BTC</small></div>
        <div class="crypto-coin">Ξ<br/><span>Ethereum</span><small>ETH</small></div>
        <div class="crypto-coin">₮<br/><span>Tether</span><small>USDT</small></div>
      </div>
      <p class="crypto-note">Pay with any major cryptocurrency. Rate locked for 60 minutes.</p>

      <div class="coinbase-waiting" id="coinbase-waiting" hidden>
        <div class="coinbase-waiting-title">₿ Coinbase checkout opened in a new tab</div>
        <div class="charge-code-row">Charge code: <span class="charge-code-val" id="charge-code-val"></span></div>
        <div class="charge-expires">Expires: <span id="charge-expires-val"></span></div>
        <div class="poll-status" id="poll-status">⏳ Waiting for payment confirmation…</div>
      </div>

      <div class="pay-error" id="cb-error" hidden></div>
      <button class="btn-pay-tab btn-pay-coinbase" id="coinbase-pay-btn">Pay ${fmt(grandTotal())} with Crypto →</button>
    </div>`;
}

async function renderPayment() {
  body.innerHTML = '<div class="co-loading">Preparing payment…</div>';

  if (!profile) {
    try { profile = await getMe(); } catch { profile = getUser(); }
  }
  if (!totals) totals = computeTotals(cart);

  body.innerHTML = `
    <div class="co-layout">
      <div class="co-card co-left">
        <div class="co-col-title">Payment Method</div>
        ${payTabsHTML()}
        <div class="pay-panels-wrap" id="pay-panels">
          ${stripeTabHTML()}
          ${razorpayTabHTML()}
          ${coinbaseTabHTML()}
        </div>
        <div class="co-spacer" style="min-height:8px"></div>
        <button class="btn-co-ghost" id="back-to-review" style="align-self:flex-start;margin-top:8px">← Back to Review</button>
      </div>
      <div class="co-card co-right">
        <div class="nvpay-secure-row">🔐 <span>256-bit SSL · Encrypted Checkout</span></div>
        <div class="co-col-title" style="font-size:0.9rem;margin-bottom:10px">Order Summary</div>
        ${summaryHTML()}
        <div class="pay-disclaimer" style="margin-top:10px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          By proceeding you agree to the
          <a href="#" class="disclaimer-link">Terms of Sale</a> &amp;
          <a href="#" class="disclaimer-link">Privacy Policy</a>.
        </div>
      </div>
    </div>`;

  // ── Tab switching ─────────────────────────────────────────────────────────
  document.getElementById('payment-tabs').addEventListener('click', async e => {
    const btn = e.target.closest('.pay-tab');
    if (!btn) return;
    const tab = btn.dataset.tab;
    if (tab === activeTab) return;

    activeTab = tab;
    document.querySelectorAll('.pay-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.pay-panel').forEach(p => {
      const show = p.id === `panel-${tab}`;
      p.classList.toggle('hidden', !show);
      if (show) p.classList.add('pay-panel-anim');
    });

    if (tab === 'stripe' && !cardElement) mountStripeElement();
    if (tab === 'razorpay') loadRazorpayScript().catch(() => {});
  });

  document.getElementById('back-to-review').addEventListener('click', () => setStep(1));

  // ── Stripe element mount ──────────────────────────────────────────────────
  if (activeTab === 'stripe') mountStripeElement();

  // ── Stripe pay ────────────────────────────────────────────────────────────
  document.getElementById('stripe-pay-btn').addEventListener('click', async () => {
    await handleStripePay();
  });

  // ── Razorpay pay ──────────────────────────────────────────────────────────
  document.getElementById('razorpay-pay-btn').addEventListener('click', async () => {
    await handleRazorpayPay();
  });

  // ── Coinbase pay ──────────────────────────────────────────────────────────
  document.getElementById('coinbase-pay-btn').addEventListener('click', async () => {
    await handleCoinbasePay();
  });
}

// ── Stripe card element ───────────────────────────────────────────────────────
function mountStripeElement() {
  if (!window.Stripe) return;
  try {
    const publishableKey = 'pk_test_placeholder'; // overwritten after intent is created
    stripeInst  = Stripe(publishableKey);
    const elements = stripeInst.elements();
    cardElement = elements.create('card', {
      style: {
        base: {
          color:           '#F1F0F7',
          fontFamily:      '"DM Sans", sans-serif',
          fontSize:        '14px',
          fontSmoothing:   'antialiased',
          '::placeholder': { color: '#6B7280' },
          iconColor:       '#7C3AED',
        },
        invalid: { color: '#EC4899', iconColor: '#EC4899' },
      },
    });
    const mount = document.getElementById('stripe-card-element');
    if (mount) cardElement.mount(mount);
  } catch (e) {
    console.warn('Stripe mount error:', e.message);
  }
}

// ── Create order helper ───────────────────────────────────────────────────────
async function createOrderFromCart() {
  return createOrder({
    name:       profile?.name  || '',
    email:      profile?.email || '',
    phone:      profile?.phone || null,
    address:    null,
    couponCode: couponData ? couponData.code : null,
  });
}

// ── Stripe payment flow ───────────────────────────────────────────────────────
async function handleStripePay() {
  const btn   = document.getElementById('stripe-pay-btn');
  const errEl = document.getElementById('stripe-error');

  btn.disabled = true;
  btn.innerHTML = '<span class="pay-spinner"></span> Processing…';
  errEl.hidden  = true;

  try {
    // 1. Create order
    const order = await createOrderFromCart();

    // 2. Create Stripe intent
    const intent = await createStripeIntent(order.id);

    // 3. Re-initialise Stripe with real publishable key
    stripeInst = Stripe(intent.publishableKey);
    const elements = stripeInst.elements();
    const freshCard = elements.create('card', {
      style: {
        base: { color:'#F1F0F7', fontFamily:'"DM Sans",sans-serif', fontSize:'14px', '::placeholder':{color:'#6B7280'}, iconColor:'#7C3AED' },
        invalid: { color:'#EC4899' },
      },
    });
    const mount = document.getElementById('stripe-card-element');
    if (cardElement) cardElement.unmount();
    cardElement = freshCard;
    if (mount) cardElement.mount(mount);

    // 4. Confirm payment
    const result = await stripeInst.confirmCardPayment(intent.clientSecret, {
      payment_method: { card: cardElement },
    });

    if (result.error) {
      errEl.textContent = result.error.message;
      errEl.hidden = false;
      btn.disabled = false;
      btn.textContent = `Pay ${fmt(grandTotal())} →`;
      return;
    }

    // 5. Success — redirect after 1 s (webhook will confirm DB)
    btn.innerHTML = '✅ Payment confirmed! Redirecting…';
    setTimeout(() => {
      window.location.href = `orders.html?success=true&orderId=${order.id}`;
    }, 1000);

  } catch (err) {
    errEl.textContent = err.message;
    errEl.hidden  = false;
    btn.disabled  = false;
    btn.textContent = `Pay ${fmt(grandTotal())} →`;
    showToast(err.message, 'error');
  }
}

// ── Razorpay payment flow ─────────────────────────────────────────────────────
async function handleRazorpayPay() {
  const btn   = document.getElementById('razorpay-pay-btn');
  const errEl = document.getElementById('rzp-error');

  btn.disabled = true;
  btn.innerHTML = '<span class="pay-spinner"></span> Opening Razorpay…';
  errEl.hidden  = true;

  try {
    await loadRazorpayScript();

    const order   = await createOrderFromCart();
    const rzpData = await createRazorpayOrder(order.id);

    const options = {
      key:         rzpData.keyId,
      amount:      rzpData.amountInPaise,
      currency:    rzpData.currency,
      name:        'NexVault',
      description: 'Digital Goods',
      order_id:    rzpData.razorpayOrderId,
      prefill: {
        name:  profile?.name  || '',
        email: profile?.email || '',
        contact: profile?.phone || '',
      },
      theme: { color: '#7C3AED' },
      handler: async function(response) {
        try {
          await verifyRazorpayPayment(
            order.id,
            response.razorpay_order_id,
            response.razorpay_payment_id,
            response.razorpay_signature
          );
          window.location.href = `orders.html?success=true&orderId=${order.id}`;
        } catch (verifyErr) {
          showToast('Signature verification failed: ' + verifyErr.message, 'error');
          btn.disabled = false;
          btn.textContent = `Pay ${fmt(grandTotal())} with Razorpay →`;
        }
      },
      modal: {
        ondismiss: function() {
          showToast('Payment cancelled', 'info');
          btn.disabled = false;
          btn.textContent = `Pay ${fmt(grandTotal())} with Razorpay →`;
        }
      }
    };

    const rzp = new window.Razorpay(options);
    rzp.open();

  } catch (err) {
    errEl.textContent = err.message;
    errEl.hidden  = false;
    btn.disabled  = false;
    btn.textContent = `Pay ${fmt(grandTotal())} with Razorpay →`;
    showToast(err.message, 'error');
  }
}

// ── Coinbase payment flow ─────────────────────────────────────────────────────
async function handleCoinbasePay() {
  const btn     = document.getElementById('coinbase-pay-btn');
  const errEl   = document.getElementById('cb-error');
  const waiting = document.getElementById('coinbase-waiting');

  btn.disabled = true;
  btn.innerHTML = '<span class="pay-spinner"></span> Creating charge…';
  errEl.hidden  = true;

  try {
    const order  = await createOrderFromCart();
    const charge = await createCoinbaseCharge(order.id);

    window.open(charge.hostedUrl, '_blank');

    btn.style.display = 'none';
    waiting.hidden = false;
    document.getElementById('charge-code-val').textContent = charge.chargeCode;
    document.getElementById('charge-expires-val').textContent = charge.expiresAt
      ? new Date(charge.expiresAt).toLocaleString('en-IN') : '60 minutes';

    // Start polling every 8 s, give up after 15 min (112 polls)
    let polls = 0;
    const MAX_POLLS = 112;

    pollTimer = setInterval(async () => {
      polls++;
      if (polls > MAX_POLLS) {
        clearInterval(pollTimer);
        document.getElementById('poll-status').innerHTML =
          '⏰ Session expired. <a href="orders.html">Check your orders</a> or try again.';
        return;
      }
      try {
        const status = await pollOrderStatus(order.id);
        console.log(`[Coinbase poll ${polls}] status:`, status.status);
        if (status.status === 'CONFIRMED') {
          clearInterval(pollTimer);
          document.getElementById('poll-status').textContent = '✅ Payment confirmed!';
          document.getElementById('poll-status').style.color = '#22D3EE';
          setTimeout(() => {
            window.location.href = `orders.html?success=true&orderId=${order.id}`;
          }, 2000);
        }
      } catch { /* ignore poll errors */ }
    }, 8000);

  } catch (err) {
    errEl.textContent = err.message;
    errEl.hidden  = false;
    btn.disabled  = false;
    btn.textContent = `Pay ${fmt(grandTotal())} with Crypto →`;
    showToast(err.message, 'error');
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
setStep(1);
</script>

</body>
</html>

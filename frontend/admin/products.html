<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products — Admin — Raidzone</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/pages/admin.css"/>
</head>
<body>

<div class="admin-layout">

  <aside class="admin-sidebar"></aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-mobile-topbar"><span class="admin-mobile-topbar-title">Products</span></div>
    <h1 class="admin-page-title" style="margin-top:28px">Products</h1>
    <p class="admin-page-subtitle">Create, edit, and manage product listings</p>

    <div class="admin-table-card">
      <div class="admin-table-header">
        <div class="admin-table-title" id="products-count">Products</div>
        <button class="btn-admin-primary" id="add-product-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Product
        </button>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width:36px"><input type="checkbox" id="select-all" style="accent-color:var(--violet)"/></th>
              <th>Image</th><th>Name</th><th>Category</th><th>Price</th>
              <th>Active</th><th>Flash</th><th>Badge</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-3)">Loading…</td></tr>
          </tbody>
        </table>
      </div>
      <div class="admin-pagination" id="pagination"></div>
    </div>
  </main>
</div>

<!-- Product Modal -->
<div class="admin-modal-overlay" id="product-modal">
  <div class="admin-modal">
    <h2 class="admin-modal-title" id="modal-title">Add Product</h2>
    <form id="product-form">
      <div class="admin-form-grid">
        <div class="admin-form-group full">
          <label class="admin-form-label">Product Name *</label>
          <input class="admin-form-input" name="name" required placeholder="e.g. Steam Wallet ₹500"/>
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Category *</label>
          <select class="admin-form-select" name="categoryId" required id="cat-select">
            <option value="">Select category…</option>
          </select>
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Price (₹) *</label>
          <input class="admin-form-input" name="price" type="number" step="0.01" min="0.01" required placeholder="499"/>
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Original Price (₹)</label>
          <input class="admin-form-input" name="originalPrice" type="number" step="0.01" min="0" placeholder="599"/>
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Company / Brand</label>
          <select class="admin-form-select" name="companyId" id="company-select">
            <option value="">— None —</option>
          </select>
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Brand (text)</label>
          <input class="admin-form-input" name="brand" placeholder="Valve / Steam"/>
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Region</label>
          <input class="admin-form-input" name="region" placeholder="Global" value="Global"/>
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Badge</label>
          <select class="admin-form-select" name="badge">
            <option value="">None</option>
            <option>HOT</option><option>NEW</option><option>SALE</option>
          </select>
        </div>
        <div class="admin-form-group full">
          <label class="admin-form-label">Description <span style="color:var(--text-4);font-weight:400">(max 2000 chars)</span></label>
          <textarea class="admin-form-textarea" name="description" rows="6" maxlength="2000" placeholder="Full marketing description…"></textarea>
        </div>
        <div class="admin-form-group full">
          <label class="admin-form-label">How to Redeem</label>
          <textarea class="admin-form-textarea" name="howToRedeem" rows="3" placeholder="Step-by-step redemption instructions (one per line)…"></textarea>
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Sort Order</label>
          <input class="admin-form-input" name="sortOrder" type="number" value="0"/>
        </div>
        <div class="admin-form-group" style="justify-content:flex-end;align-items:flex-start;padding-top:22px;">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--text-2);font-size:0.875rem;">
            <input type="checkbox" name="isFlashDeal" style="width:16px;height:16px;accent-color:var(--violet)"/>
            Flash Deal
          </label>
        </div>
        <!-- Image upload -->
        <div class="admin-form-group full" id="image-upload-row">
          <label class="admin-form-label">Product Image <span style="color:var(--text-4);font-weight:400">(optional — JPEG · PNG · WebP)</span></label>
          <div class="file-upload-zone" id="file-upload-zone">
            <div class="file-upload-icon">⬆</div>
            <div class="file-upload-text" id="file-upload-text">Click or drag to upload image</div>
            <div class="file-upload-sub">JPEG · PNG · WebP — max 5 MB</div>
            <input type="file" id="image-file-input" accept="image/jpeg,image/png,image/webp"/>
          </div>
          <div id="image-preview" style="margin-top:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;"></div>
          <div id="image-upload-note" style="font-size:0.75rem;color:var(--text-4);margin-top:4px;"></div>
          <button type="button" class="btn-admin-primary" id="upload-image-btn" style="margin-top:10px;display:none;align-self:flex-start;">Upload Image</button>
        </div>
      </div>
      <div class="admin-modal-footer">
        <button type="button" class="btn-admin-cancel" id="modal-cancel">Cancel</button>
        <button type="submit" class="btn-admin-primary" id="modal-submit">Save Product</button>
      </div>
    </form>
  </div>
</div>

<!-- Bulk action bar -->
<div class="bulk-action-bar" id="bulk-bar">
  <span class="bulk-count" id="bulk-count">0 selected</span>
  <button class="btn-admin-primary" style="font-size:0.8rem;padding:6px 14px" id="bulk-activate">Activate</button>
  <button class="btn-admin-cancel" style="font-size:0.8rem;padding:6px 14px" id="bulk-deactivate">Deactivate</button>
</div>

<!-- Mobile bottom nav -->
<nav class="admin-bottom-nav">
  <a href="index.html" class="admin-bottom-tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Analytics
  </a>
  <a href="products.html" class="admin-bottom-tab active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
    Products
  </a>
  <a href="categories.html" class="admin-bottom-tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Categories
  </a>
  <a href="users.html" class="admin-bottom-tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
    Users
  </a>
</nav>

<div id="toast-container"></div>

<script src="../js/config.js"></script>
<script type="module">
import { showToast } from '../js/components/toast.js';
import { initAuth, isLoggedIn, isAdmin } from '../js/auth.js';
import { initAdminSidebar } from './js/adminSidebar.js';
import {
  adminGetProducts, adminCreateProduct, adminUpdateProduct, adminDeleteProduct,
  adminUploadImage, getCategories, getCategoriesFlat, adminGetCompanies,
  adminToggleProductActive, adminToggleFlashDeal, adminSetBadge, adminBulkToggleActive
} from '../js/api.js';

await initAuth();
if (!isLoggedIn() || !isAdmin()) window.location.href = '../login.html';
await initAdminSidebar('products');

let currentPage = 0;
let editingId = null;
let categories = [];
let companies = [];
let productsCache = {};   // id → product object, for edit pre-population

const tbody      = document.getElementById('products-tbody');
const pagination = document.getElementById('pagination');
const modal      = document.getElementById('product-modal');
const form       = document.getElementById('product-form');
const countEl    = document.getElementById('products-count');

async function loadCategories() {
  try {
    const tree = await getCategories();
    const sel = document.getElementById('cat-select');
    // Build flat list from hierarchy so children are grouped under parents
    categories = [];
    tree.forEach(parent => {
      // Add parent as a disabled label
      const po = document.createElement('option');
      po.value = parent.id;
      po.textContent = parent.name;
      po.style.fontWeight = 'bold';
      sel.appendChild(po);
      categories.push(parent);
      // Add children indented
      if (parent.children && parent.children.length) {
        parent.children.forEach(child => {
          const co = document.createElement('option');
          co.value = child.id;
          co.textContent = '  └ ' + child.name;
          sel.appendChild(co);
          categories.push(child);
        });
      }
    });
  } catch (e) { /* ignore */ }
}

async function loadCompanies() {
  try {
    companies = await adminGetCompanies();
    const sel = document.getElementById('company-select');
    if (!sel) return;
    companies.forEach(c => {
      const o = document.createElement('option');
      o.value = c.id;
      o.textContent = c.name;
      sel.appendChild(o);
    });
  } catch (e) { /* ignore */ }
}

async function loadProducts(page = 0) {
  tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-3)">Loading…</td></tr>`;
  try {
    const result = await adminGetProducts(page, 20);
    const products = result.content || [];
    countEl.textContent = `Products (${result.totalElements ?? products.length})`;
    currentPage = result.number ?? page;
    renderTable(products);
    renderPagination(result);
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="9" style="color:var(--danger);padding:24px;text-align:center">${err.message}</td></tr>`;
  }
}

function renderTable(products) {
  if (!products.length) {
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-3)">No products found</td></tr>`;
    return;
  }
  productsCache = {};
  products.forEach(p => { productsCache[p.id] = p; });

  tbody.innerHTML = products.map(p => {
    const imgHtml = p.imageUrl
      ? `<div class="table-thumb"><img src="${p.imageUrl}" alt=""/></div>`
      : `<div class="table-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20" style="opacity:.4"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div>`;
    const price   = p.price != null ? `₹${Number(p.price).toLocaleString('en-IN')}` : '—';
    const active  = p.isActive !== false;
    const flash   = !!p.isFlashDeal;
    const badge   = p.badge || '';
    const safeId  = p.id;
    return `
      <tr data-id="${safeId}">
        <td style="width:36px"><input type="checkbox" class="row-check" data-id="${safeId}" style="accent-color:var(--violet)"/></td>
        <td>${imgHtml}</td>
        <td>
          <div class="table-product-name">${p.name}</div>
          <div style="font-size:0.75rem;color:var(--text-4)">${p.slug}</div>
        </td>
        <td>${p.categoryName || '—'}</td>
        <td>${price}</td>
        <td>
          <label class="admin-toggle" title="${active ? 'Active — click to deactivate' : 'Inactive — click to activate'}">
            <input type="checkbox" ${active ? 'checked' : ''} onchange="toggleActive('${safeId}', this.checked)"/>
            <span class="admin-toggle-slider"></span>
          </label>
        </td>
        <td>
          <label class="admin-toggle" title="${flash ? 'Flash Deal' : 'Not a flash deal'}">
            <input type="checkbox" ${flash ? 'checked' : ''} onchange="toggleFlash('${safeId}', this.checked)"/>
            <span class="admin-toggle-slider"></span>
          </label>
        </td>
        <td>
          <select class="badge-select" onchange="setBadge('${safeId}', this.value)">
            <option value="" ${!badge ? 'selected' : ''}>—</option>
            <option value="HOT"  ${badge==='HOT'  ? 'selected' : ''}>HOT</option>
            <option value="NEW"  ${badge==='NEW'  ? 'selected' : ''}>NEW</option>
            <option value="SALE" ${badge==='SALE' ? 'selected' : ''}>SALE</option>
          </select>
        </td>
        <td>
          <div class="admin-actions-cell">
            <button class="btn-table-action" onclick="openEdit('${safeId}')">Edit</button>
            <button class="btn-table-action danger" onclick="deleteProduct('${safeId}','${p.name.replace(/'/g,'').replace(/"/g,'')}')">Delete</button>
          </div>
        </td>
      </tr>`;
  }).join('');

  // Bind checkbox for bulk
  document.querySelectorAll('.row-check').forEach(cb => {
    cb.addEventListener('change', updateBulkBar);
  });
}

// ── Quick toggles ─────────────────────────────────────────────────────────────

window.toggleActive = async function(id, checked) {
  try {
    await adminToggleProductActive(id);
    if (productsCache[id]) productsCache[id].isActive = checked;
  } catch (err) {
    showToast(err.message, 'error');
    loadProducts(currentPage);
  }
};

window.toggleFlash = async function(id, checked) {
  try {
    await adminToggleFlashDeal(id);
    if (productsCache[id]) productsCache[id].isFlashDeal = checked;
  } catch (err) {
    showToast(err.message, 'error');
    loadProducts(currentPage);
  }
};

window.setBadge = async function(id, badge) {
  try {
    await adminSetBadge(id, badge || null);
    if (productsCache[id]) productsCache[id].badge = badge;
  } catch (err) {
    showToast(err.message, 'error');
    loadProducts(currentPage);
  }
};

// ── Bulk bar ──────────────────────────────────────────────────────────────────

function getSelectedIds() {
  return [...document.querySelectorAll('.row-check:checked')].map(cb => cb.dataset.id);
}

function updateBulkBar() {
  const ids = getSelectedIds();
  const bar = document.getElementById('bulk-bar');
  document.getElementById('bulk-count').textContent = `${ids.length} selected`;
  bar.classList.toggle('visible', ids.length > 0);
}

document.getElementById('select-all').addEventListener('change', e => {
  document.querySelectorAll('.row-check').forEach(cb => { cb.checked = e.target.checked; });
  updateBulkBar();
});

document.getElementById('bulk-activate').addEventListener('click', async () => {
  const ids = getSelectedIds();
  if (!ids.length) return;
  try {
    await adminBulkToggleActive(ids, true);
    showToast(`${ids.length} products activated`, 'success');
    loadProducts(currentPage);
  } catch (err) { showToast(err.message, 'error'); }
});

document.getElementById('bulk-deactivate').addEventListener('click', async () => {
  const ids = getSelectedIds();
  if (!ids.length) return;
  try {
    await adminBulkToggleActive(ids, false);
    showToast(`${ids.length} products deactivated`, 'info');
    loadProducts(currentPage);
  } catch (err) { showToast(err.message, 'error'); }
});

function renderPagination(page) {
  if (!page || page.totalPages <= 1) { pagination.innerHTML = ''; return; }
  const prev = `<button class="page-btn" onclick="loadProducts(${page.number - 1})" ${page.first ? 'disabled' : ''}>← Prev</button>`;
  const next = `<button class="page-btn" onclick="loadProducts(${page.number + 1})" ${page.last  ? 'disabled' : ''}>Next →</button>`;
  pagination.innerHTML = `${prev}<span class="page-info">Page ${page.number + 1} / ${page.totalPages}</span>${next}`;
}

// ── Modal helpers ─────────────────────────────────────────────────────────────

function openAdd() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add Product';
  document.getElementById('upload-image-btn').style.display = 'none';
  document.getElementById('image-upload-note').textContent = 'Image uploads automatically after saving.';
  form.reset();
  resetUploadZone();
  modal.classList.add('open');
}

window.openEdit = function(id) {
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Product';
  document.getElementById('upload-image-btn').style.display = 'inline-flex';
  document.getElementById('image-upload-note').textContent = '';
  form.reset();
  resetUploadZone();

  const p = productsCache[id];
  if (p) {
    form.elements['name'].value          = p.name || '';
    form.elements['price'].value         = p.price != null ? p.price : '';
    form.elements['originalPrice'].value = p.originalPrice != null ? p.originalPrice : '';
    form.elements['brand'].value         = p.brand || '';
    form.elements['region'].value        = p.region || 'Global';
    form.elements['badge'].value         = p.badge || '';
    form.elements['description'].value   = p.description || '';
    form.elements['howToRedeem'].value   = p.howToRedeem || '';
    form.elements['sortOrder'].value     = p.sortOrder != null ? p.sortOrder : 0;
    form.elements['isFlashDeal'].checked = !!p.isFlashDeal;
    setTimeout(() => {
      form.elements['categoryId'].value = p.categoryId || '';
      if (form.elements['companyId']) form.elements['companyId'].value = p.companyId || '';
    }, 0);
    // Show current image in preview
    if (p.imageUrl) {
      document.getElementById('image-preview').innerHTML =
        `<img src="${p.imageUrl}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--glass-border);"/>
         <span style="font-size:0.8rem;color:var(--text-3);align-self:center">Current image</span>`;
    }
  }

  modal.classList.add('open');
};

window.deleteProduct = async function(id, name) {
  if (!confirm(`Deactivate "${name}"?`)) return;
  try {
    await adminDeleteProduct(id);
    showToast(`"${name}" deactivated`, 'info');
    loadProducts(currentPage);
  } catch (err) { showToast(err.message, 'error'); }
};

document.getElementById('add-product-btn').addEventListener('click', openAdd);
document.getElementById('modal-cancel').addEventListener('click', () => { modal.classList.remove('open'); });
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

// ── File upload zone interactions ─────────────────────────────────────────────

const fileInput    = document.getElementById('image-file-input');
const uploadZone   = document.getElementById('file-upload-zone');
const uploadText   = document.getElementById('file-upload-text');
const imagePreview = document.getElementById('image-preview');

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) { resetUploadZone(); return; }
  uploadZone.classList.add('has-file');
  uploadText.textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    imagePreview.innerHTML = `<img src="${e.target.result}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--glass-border);"/><span style="font-size:0.8rem;color:var(--text-3);align-self:center">${file.name}</span>`;
  };
  reader.readAsDataURL(file);
});

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer?.files[0];
  if (file) {
    const dt = new DataTransfer();
    dt.items.add(file);
    fileInput.files = dt.files;
    fileInput.dispatchEvent(new Event('change'));
  }
});

function resetUploadZone() {
  uploadZone.classList.remove('has-file', 'drag-over');
  uploadText.textContent = 'Click or drag to upload image';
  imagePreview.innerHTML = '';
}

// ── Image upload (edit mode — standalone Upload button) ───────────────────────

document.getElementById('upload-image-btn')?.addEventListener('click', async () => {
  const file = fileInput.files[0];
  if (!file) { showToast('Select a file first', 'info'); return; }
  if (!editingId) { showToast('Save the product first, then upload image', 'info'); return; }
  try {
    const updated = await adminUploadImage(editingId, file);
    imagePreview.innerHTML = `<img src="${updated.imageUrl}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--glass-border);"/>`;
    showToast('Image uploaded', 'success');
    resetUploadZone();
  } catch (err) { showToast(err.message, 'error'); }
});

// ── Form submit ───────────────────────────────────────────────────────────────

form.addEventListener('submit', async e => {
  e.preventDefault();
  const fd  = new FormData(form);
  const btn = document.getElementById('modal-submit');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  const categoryId = fd.get('categoryId') || null;
  if (!categoryId) {
    showToast('Please select a category', 'info');
    btn.disabled = false;
    btn.textContent = 'Save Product';
    return;
  }

  const data = {
    name:          fd.get('name'),
    categoryId,
    companyId:     fd.get('companyId') || null,
    price:         parseFloat(fd.get('price')),
    originalPrice: fd.get('originalPrice') ? parseFloat(fd.get('originalPrice')) : null,
    description:   fd.get('description') || null,
    howToRedeem:   fd.get('howToRedeem') || null,
    brand:         fd.get('brand') || null,
    region:        fd.get('region') || 'Global',
    badge:         fd.get('badge') || null,
    isFlashDeal:   fd.get('isFlashDeal') === 'on',
    sortOrder:     parseInt(fd.get('sortOrder')) || 0,
  };

  try {
    const imageFile = document.getElementById('image-file-input').files[0];

    if (editingId) {
      await adminUpdateProduct(editingId, data);
      if (imageFile) {
        const updated = await adminUploadImage(editingId, imageFile);
        const prev = document.getElementById('image-preview');
        prev.innerHTML = `<img src="${updated.imageUrl}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;margin-top:4px;"/>`;
      }
      showToast('Product updated', 'success');
    } else {
      const created = await adminCreateProduct(data);
      if (imageFile && created?.id) {
        btn.textContent = 'Uploading image…';
        await adminUploadImage(created.id, imageFile);
      }
      showToast('Product created', 'success');
    }
    modal.classList.remove('open');
    resetUploadZone();
    loadProducts(currentPage);
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Product';
  }
});

loadCategories();
loadCompanies();
loadProducts(0);
</script>

</body>
</html>

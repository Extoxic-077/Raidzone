        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Category *</label>
          <select class="admin-form-select" name="categoryId" required id="cat-select">

        </div>

        </div>
        <div class="admin-form-group">

        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Item Type</label>

        <div class="admin-form-group full">

<script type="module">
import { showToast } from '../js/components/toast.js';
import { initAuth, isLoggedIn, isAdmin } from '../js/auth.js';
import { initAdminSidebar } from './js/adminSidebar.js';
import {
  adminGetProducts, adminCreateProduct, adminUpdateProduct, adminDeleteProduct,
  adminUploadImage, getCategories, getCategoriesFlat, adminGetCompanies,
  adminToggleProductActive, adminToggleFlashDeal, adminSetBadge, adminBulkToggleActive
} from '../js/api.js?v=2026.04.26.1';

console.log('API version loaded: 2026.04.26.1');

await initAuth();
if (!isLoggedIn() || !isAdmin()) window.location.href = '../login.html';
await initAdminSidebar('products');

let currentPage = 0;
let editingId = null;
let categories = [];
let companies = [];
let productsCache = {};   // id → product object, for edit pre-population

const tbody      = document.getElementById('products-tbody');
const pagination = document.getElementById('pagination');
const modal      = document.getElementById('product-modal');
const form       = document.getElementById('product-form');
const countEl    = document.getElementById('products-count');
const itemTypeSelect = document.getElementById('item-type-select');
const typeSel = itemTypeSelect; // FIX: Define typeSel for classification logic

// AUTO-CLASSIFY ON INPUT
document.querySelector('input[name="name"]').addEventListener('input', async (e) => {
  const name = e.target.value;
  if (name.length < 3) return;
  
  // Basic frontend classification for UI feel
  const match = BLUEPRINT_OPTIONS.find(opt => name.toLowerCase().includes(opt.toLowerCase()));
  if (match) {
    if (!selectedBlueprints.includes(match)) {
      selectedBlueprints.push(match);
      blueprintSelectorApi.renderOptions();
      blueprintSelectorApi.sync();
    }
  }
});

const ITEM_TYPES = [
  'Blueprints', 'Weapons', 'Weapon Mods', 'Augments', 'Shields', 'Quick Use',
  'Traps', 'Crafting Materials', 'Keys', 'Coins', 'Other', 'Assorted Seeds'
];
const BLUEPRINT_OPTIONS = [
  'Anvil','Angled Grip II','Combat Mk. 3 (Flanking)','Compensator II','Compensator III','Complex Gun Parts',
  'Defibrillator','Explosive Mine','Extended Barrel','Extended Light Magazine II','Extended Light Magazine III',
  'Extended Medium Magazine II','Angled Grip III','Extended Medium Magazine III','Extended Shotgun Magazine II',
  'Extended Shotgun Magazine III','Equalizer','Fireworks Box','Heavy Gun Parts','Hullcracker','Il Toro','Jolt Mine',
  'Jupiter','Aphelion','Light Gun Parts','Light Stick (Any Color)','Lightweight Stock','Looting Mk. 3 (Survivor)',
  'Lure Grenade','Medium Gun Parts','Muzzle Brake II','Muzzle Brake III','Osprey','Padded Stock','Barricade Kit',
  'Remote Raider Flare','Seeker Grenade','Shotgun Choke II','Shotgun Choke III','Shotgun Silencer','Showstopper',
  'Silencer I','Silencer II','Smoke Grenade','Snap Hook','Bettina','Stable Stock II','Stable Stock III',
  'Tactical Mk. 3 (Defensive)','Tactical Mk. 3 (Healing)','Tagging Grenade','Tempest','Torrente',"Trigger 'Nade",
  'Venator','Vertical Grip II','Blaze Grenade','Vertical Grip III','Vita Shot','Vita Spray','Vulcano','Wolfpack',
  'Other','Trailblazer','Gas Mine','Deadline','Canto','Bobcat','Dolabra','Surge Coil','Burletta',
  'Combat Mk. 3 (Aggressive)'
];
let selectedBlueprints = [];
let blueprintSelectorApi = null;
let blueprintDocClickBound = false;

async function loadCategories() {
  try {
    const tree = await getCategories();
    const sel = document.getElementById('cat-select');
    sel.innerHTML = '<option value="">Select category…</option>';
    categories = [];

    function renderOptions(nodes, depth = 0) {
      nodes.forEach(node => {
        const o = document.createElement('option');
        o.value = node.id;
        // Indent based on depth
        const prefix = depth > 0 ? '&nbsp;&nbsp;'.repeat(depth) + '└ ' : '';
        o.innerHTML = prefix + node.name;
        if (depth === 0) o.style.fontWeight = 'bold';
        sel.appendChild(o);
        categories.push(node);
        if (node.children && node.children.length) {
          renderOptions(node.children, depth + 1);
        }
      });
    }

    renderOptions(tree);
  } catch (e) { /* ignore */ }
}

async function loadCompanies() {
  try {
    companies = await adminGetCompanies();
    const sel = document.getElementById('company-select');
    if (!sel) return;
    companies.forEach(c => {
      const o = document.createElement('option');
      o.value = c.id;
      o.textContent = c.name;
      sel.appendChild(o);
    });
  } catch (e) { /* ignore */ }
}

function initItemTypeOptions() {
  const sel = document.getElementById('item-type-select');
  if (!sel) return;
  ITEM_TYPES.forEach(t => {
    const o = document.createElement('option');
    o.value = t;
    o.textContent = t;
    sel.appendChild(o);
  });
}

function initBlueprintSelector() {
  const root     = document.getElementById('blueprint-filter');
  const trigger  = document.getElementById('blueprint-trigger');
  const dropdown = document.getElementById('blueprint-dropdown');
  const search   = document.getElementById('blueprint-search');
  const options  = document.getElementById('blueprint-options');
  const tags     = document.getElementById('blueprint-tags');
  const input    = document.getElementById('blueprint-tags-input');

  const renderOptions = () => {
    const q = search.value.toLowerCase();
    const filtered = BLUEPRINT_OPTIONS.filter(opt => opt.toLowerCase().includes(q));
    options.innerHTML = filtered.map(opt => `
      <label class="multi-filter-option">
        <input type="checkbox" value="${opt}" ${selectedBlueprints.includes(opt) ? 'checked' : ''} />
        ${opt}
      </label>
    `).join('');
    
    options.querySelectorAll('input').forEach(cb => {
      cb.addEventListener('change', () => {
        if (cb.checked) {
          if (!selectedBlueprints.includes(cb.value)) selectedBlueprints.push(cb.value);
        } else {
          selectedBlueprints = selectedBlueprints.filter(s => s !== cb.value);
        }
        sync();
      });
    });
  };

  const sync = () => {
    tags.innerHTML = selectedBlueprints.map(s => `
      <span class="multi-filter-tag">${s} <button type="button" data-val="${s}">×</button></span>
    `).join('');
    input.value = selectedBlueprints.join(', ');
    
    tags.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        selectedBlueprints = selectedBlueprints.filter(s => s !== btn.dataset.val);
        renderOptions();
        sync();
      });
    });
  };

  trigger.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    root.classList.toggle('open');
    trigger.setAttribute('aria-expanded', root.classList.contains('open'));
  });

  search.addEventListener('click', e => e.stopPropagation());
  search.addEventListener('input', renderOptions);
  
  if (!blueprintDocClickBound) {
    document.addEventListener('click', (e) => {
      if (!root.contains(e.target)) {
        root.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
      }
    });
    blueprintDocClickBound = true;
  }

  return { root, search, renderOptions, sync };
}

async function loadProducts(page = 0) {
  tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-3)">Loading…</td></tr>`;
  try {
    const result = await adminGetProducts(page, 20);
    const products = result.content || [];
    countEl.textContent = `Products (${result.totalElements ?? products.length})`;
    currentPage = result.number ?? page;
    renderTable(products);
    renderPagination(result);
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="9" style="color:var(--danger);padding:24px;text-align:center">${err.message}</td></tr>`;
  }
}

function renderTable(products) {
  if (!products.length) {
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-3)">No products found</td></tr>`;
    return;
  }
  productsCache = {};
  products.forEach(p => { productsCache[p.id] = p; });

  tbody.innerHTML = products.map(p => {
    const imgHtml = p.imageUrl
      ? `<div class="table-thumb"><img src="${p.imageUrl}" alt=""/></div>`
      : `<div class="table-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20" style="opacity:.4"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div>`;
    const price    = p.price != null ? `$${Number(p.price).toLocaleString('en-US')}` : '—';
    const active   = p.active !== false;
    const flash    = !!p.isFlash;
    const badge    = p.badge || '';
    const safeId   = p.id || p._id; // Ensure we get the ID correctly
    const itemType = p.attributes?.itemType || p.itemType || '—';
    return `
      <tr data-id="${safeId}">
        <td style="width:36px"><input type="checkbox" class="row-check" data-id="${safeId}" style="accent-color:var(--violet)"/></td>
        <td>${imgHtml}</td>
        <td>
          <div class="table-product-name">${p.name}</div>
          <div style="font-size:0.75rem;color:var(--text-4)">${p.game || '—'} | ${String(safeId).substring(0,8)}</div>
        </td>
        <td>${p.game || '—'}</td>
        <td><span style="font-size:0.75rem;padding:2px 6px;background:rgba(255,255,255,0.05);border-radius:4px">${itemType}</span></td>
        <td>${price}</td>
        <td>
          <label class="admin-toggle" title="${active ? 'Active — click to deactivate' : 'Inactive — click to activate'}">
            <input type="checkbox" ${active ? 'checked' : ''} onchange="toggleActive('${safeId}', this.checked)"/>
            <span class="admin-toggle-slider"></span>
          </label>
        </td>
        <td>
          <label class="admin-toggle" title="${flash ? 'Flash Deal' : 'Not a flash deal'}">
            <input type="checkbox" ${flash ? 'checked' : ''} onchange="toggleFlash('${safeId}', this.checked)"/>
            <span class="admin-toggle-slider"></span>
          </label>
        </td>
        <td>
          <select class="badge-select" onchange="setBadge('${safeId}', this.value)">
            <option value="" ${!badge ? 'selected' : ''}>—</option>
            <option value="HOT"  ${badge==='HOT'  ? 'selected' : ''}>HOT</option>
            <option value="NEW"  ${badge==='NEW'  ? 'selected' : ''}>NEW</option>
            <option value="SALE" ${badge==='SALE' ? 'selected' : ''}>SALE</option>
          </select>
        </td>
        <td>
          <div class="admin-actions-cell">
            <button class="btn-table-action" onclick="openEdit('${safeId}')">Edit</button>
            <button class="btn-table-action danger" onclick="deleteProduct('${safeId}','${p.name.replace(/'/g,'').replace(/"/g,'')}')">Delete</button>
          </div>
        </td>
      </tr>`;
  }).join('');

  // Bind checkbox for bulk
  document.querySelectorAll('.row-check').forEach(cb => {
    cb.addEventListener('change', updateBulkBar);
  });
}

// ── Quick toggles ─────────────────────────────────────────────────────────────

window.toggleActive = async function(id, checked) {
  try {
    await adminToggleProductActive(id);
    if (productsCache[id]) productsCache[id].isActive = checked;
  } catch (err) {
    showToast(err.message, 'error');
    loadProducts(currentPage);
  }
};

window.toggleFlash = async function(id, checked) {
  try {
    await adminToggleFlashDeal(id);
    if (productsCache[id]) productsCache[id].isFlashDeal = checked;
  } catch (err) {
    showToast(err.message, 'error');
    loadProducts(currentPage);
  }
};

window.setBadge = async function(id, badge) {
  try {
    await adminSetBadge(id, badge || null);
    if (productsCache[id]) productsCache[id].badge = badge;
  } catch (err) {
    showToast(err.message, 'error');
    loadProducts(currentPage);
  }
};

// ── Bulk bar ──────────────────────────────────────────────────────────────────

function getSelectedIds() {
  return [...document.querySelectorAll('.row-check:checked')].map(cb => cb.dataset.id);
}

function updateBulkBar() {
  const ids = getSelectedIds();
  const bar = document.getElementById('bulk-bar');
  document.getElementById('bulk-count').textContent = `${ids.length} selected`;
  bar.classList.toggle('visible', ids.length > 0);
}

document.getElementById('select-all').addEventListener('change', e => {
  document.querySelectorAll('.row-check').forEach(cb => { cb.checked = e.target.checked; });
  updateBulkBar();
});

document.getElementById('bulk-activate').addEventListener('click', async () => {
  const ids = getSelectedIds();
  if (!ids.length) return;
  try {
    await adminBulkToggleActive(ids, true);
    showToast(`${ids.length} products activated`, 'success');
    loadProducts(currentPage);
  } catch (err) { showToast(err.message, 'error'); }
});

document.getElementById('bulk-deactivate').addEventListener('click', async () => {
  const ids = getSelectedIds();
  if (!ids.length) return;
  try {
    await adminBulkToggleActive(ids, false);
    showToast(`${ids.length} products deactivated`, 'info');
    loadProducts(currentPage);
  } catch (err) { showToast(err.message, 'error'); }
});

function renderPagination(page) {
  if (!page || page.totalPages <= 1) { pagination.innerHTML = ''; return; }
  const prev = `<button class="page-btn" onclick="loadProducts(${page.number - 1})" ${page.first ? 'disabled' : ''}>← Prev</button>`;
  const next = `<button class="page-btn" onclick="loadProducts(${page.number + 1})" ${page.last  ? 'disabled' : ''}>Next →</button>`;
  pagination.innerHTML = `${prev}<span class="page-info">Page ${page.number + 1} / ${page.totalPages}</span>${next}`;
}

// ── Modal helpers ─────────────────────────────────────────────────────────────

function openAdd() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add Product';
  document.getElementById('upload-image-btn').style.display = 'none';
  document.getElementById('image-upload-note').textContent = 'Image uploads automatically after saving.';
  form.reset();
  selectedBlueprints = [];
  document.getElementById('blueprint-tags-input').value = '';
  if (blueprintSelectorApi) {
    blueprintSelectorApi.search.value = '';
    blueprintSelectorApi.root.classList.remove('open');
    blueprintSelectorApi.renderOptions();
    blueprintSelectorApi.sync();
  }
  resetUploadZone();
  modal.classList.add('open');
}

window.openEdit = function(id) {
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Product';
  document.getElementById('upload-image-btn').style.display = 'inline-flex';
  document.getElementById('image-upload-note').textContent = '';
  form.reset();
  resetUploadZone();

  const p = productsCache[id];
  if (p) {
    form.elements['name'].value          = p.name || '';
    form.elements['price'].value         = p.price != null ? p.price : '';
    form.elements['originalPrice'].value = p.originalPrice != null ? p.originalPrice : '';
    form.elements['brand'].value         = p.attributes?.brand || p.brand || '';
    form.elements['region'].value        = p.attributes?.region || p.region || 'Global';
    form.elements['badge'].value         = p.badge || '';
    form.elements['itemType'].value      = p.attributes?.itemType || p.itemType || '';
    form.elements['description'].value   = p.description || '';
    form.elements['instructions'].value  = p.instructions || '';
    form.elements['sortOrder'].value     = p.sortOrder != null ? p.sortOrder : 0;
    form.elements['stock'].value         = p.stock != null ? p.stock : 999;
    form.elements['isFlash'].checked     = !!p.isFlash;

    // Load blueprint tags (subType)
    const subType = p.attributes?.subType || p.subType;
    selectedBlueprints = subType ? subType.split(', ').filter(Boolean) : [];
    if (blueprintSelectorApi) {
      blueprintSelectorApi.renderOptions();
      blueprintSelectorApi.sync();
    }

    setTimeout(() => {
      form.elements['categoryId'].value = p.categoryId || '';
      if (form.elements['companyId']) form.elements['companyId'].value = p.companyId || '';
    }, 0);
    // Show current image in preview
    if (p.imageUrl) {
      document.getElementById('image-preview').innerHTML =
        `<img src="${p.imageUrl}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--glass-border);"/>
         <span style="font-size:0.8rem;color:var(--text-3);align-self:center">Current image</span>`;
    }
  }

  modal.classList.add('open');
};

window.deleteProduct = async function(id, name) {
  if (!confirm(`Delete "${name}"?\n\nThis will remove it from the storefront.`)) return;
  try {
    await adminDeleteProduct(id);
    const row = tbody.querySelector(`tr[data-id="${id}"]`);
    if (row) row.remove();
    const match = countEl.textContent.match(/\d+/);
    if (match) countEl.textContent = `Products (${Math.max(0, parseInt(match[0]) - 1)})`;
    showToast(`"${name}" deleted`, 'success');
  } catch (err) { showToast(err.message, 'error'); }
};

document.getElementById('add-product-btn').addEventListener('click', openAdd);
document.getElementById('modal-cancel').addEventListener('click', () => { modal.classList.remove('open'); });
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

// ── File upload zone interactions ─────────────────────────────────────────────

const fileInput    = document.getElementById('image-file-input');
const uploadZone   = document.getElementById('file-upload-zone');
const uploadText   = document.getElementById('file-upload-text');
const imagePreview = document.getElementById('image-preview');

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) { resetUploadZone(); return; }
  uploadZone.classList.add('has-file');
  uploadText.textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    imagePreview.innerHTML = `<img src="${e.target.result}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--glass-border);"/><span style="font-size:0.8rem;color:var(--text-3);align-self:center">${file.name}</span>`;
  };
  reader.readAsDataURL(file);
});

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer?.files[0];
  if (file) {
    const dt = new DataTransfer();
    dt.items.add(file);
    fileInput.files = dt.files;
    fileInput.dispatchEvent(new Event('change'));
  }
});

function resetUploadZone() {
  uploadZone.classList.remove('has-file', 'drag-over');
  uploadText.textContent = 'Click or drag to upload image';
  imagePreview.innerHTML = '';
}

// ── Image upload (edit mode — standalone Upload button) ───────────────────────

document.getElementById('upload-image-btn')?.addEventListener('click', async () => {
  const file = fileInput.files[0];
  if (!file) { showToast('Select a file first', 'info'); return; }
  if (!editingId) { showToast('Save the product first, then upload image', 'info'); return; }
  try {
    const updated = await adminUploadImage(editingId, file);
    imagePreview.innerHTML = `<img src="${updated.imageUrl}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--glass-border);"/>`;
    showToast('Image uploaded', 'success');
    resetUploadZone();
  } catch (err) { showToast(err.message, 'error'); }
});

// ── Form submit ───────────────────────────────────────────────────────────────

form.addEventListener('submit', async e => {
  e.preventDefault();
  const fd  = new FormData(form);
  const btn = document.getElementById('modal-submit');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  const categoryId = fd.get('categoryId') || null;
  if (!categoryId) {
    showToast('Please select a category', 'info');
    btn.disabled = false;
    btn.textContent = 'Save Product';
    return;
  }
  
  // Find category slug for "game" field
  const cat = categories.find(c => c.id === categoryId);
  const game = cat ? cat.slug : categoryId; 

  const data = {
    name:          fd.get('name'),
    game,
    price:         parseFloat(fd.get('price')),
    originalPrice: fd.get('originalPrice') ? parseFloat(fd.get('originalPrice')) : null,
    description:   fd.get('description') || null,
    instructions:  fd.get('instructions') || null,
    badge:         fd.get('badge') || null,
    isFlash:       fd.get('isFlash') === 'on',
    stock:         parseInt(fd.get('stock')) || 0,
    sortOrder:     parseInt(fd.get('sortOrder')) || 0,
    attributes: {
      itemType: fd.get('itemType') || null,
      subType:  fd.get('subType') || null,
      brand:    fd.get('brand') || null,
      region:   fd.get('region') || 'Global'
    }
  };

  try {
    const imageFile = document.getElementById('image-file-input').files[0];

    if (editingId) {
      const result = await adminUpdateProduct(editingId, data);
      if (imageFile) {
        const updated = await adminUploadImage(editingId, imageFile);
        const prev = document.getElementById('image-preview');
        prev.innerHTML = `<img src="${updated.imageUrl}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;margin-top:4px;"/>`;
      }
      showToast('Product updated', 'success');
    } else {
      const created = await adminCreateProduct(data);
      if (imageFile && created?.id) {
        btn.textContent = 'Uploading image…';
        await adminUploadImage(created.id, imageFile);
      }
      showToast('Product created', 'success');
    }
    modal.classList.remove('open');
    resetUploadZone();
    loadProducts(currentPage);
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Product';
  }
});

loadCategories();
loadCompanies();
initItemTypeOptions();
blueprintSelectorApi = initBlueprintSelector();
loadProducts(0);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — NexVault</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/pages/admin.css"/>
</head>
<body>

<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-logo">NexVault <span>Admin Panel</span></div>
    <div class="admin-nav-section">Overview</div>
    <a href="index.html"    class="admin-nav-link active">
      <svg class="admin-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <div class="admin-nav-section">Catalogue</div>
    <a href="products.html" class="admin-nav-link">
      <svg class="admin-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
      Products
    </a>
    <div class="admin-nav-section">Users</div>
    <a href="users.html" class="admin-nav-link">
      <svg class="admin-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Users
    </a>
    <div class="admin-nav-back">
      <a href="../index.html" class="admin-nav-link">
        <svg class="admin-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Store
      </a>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <h1 class="admin-page-title">Dashboard</h1>
    <p class="admin-page-subtitle" id="welcome-text">Welcome back!</p>

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-card-icon">⏳</div><div class="stat-card-value">—</div><div class="stat-card-label">Loading…</div></div>
    </div>

    <div class="admin-table-card">
      <div class="admin-table-header">
        <div class="admin-table-title">Quick Actions</div>
      </div>
      <div style="padding:24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;">
        <a href="products.html" class="btn-admin-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/></svg>
          Manage Products
        </a>
        <a href="users.html" class="btn-admin-primary" style="background:linear-gradient(135deg,#1a1a2e,#22D3EE)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          Manage Users
        </a>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>

<script type="module">
import { showToast } from '../js/components/toast.js';
import { initAuth, isLoggedIn, isAdmin, getUser } from '../js/auth.js';
import { adminGetStats } from '../js/api.js';

await initAuth();
if (!isLoggedIn() || !isAdmin()) {
  window.location.href = '../login.html';
}

const user = getUser();
document.getElementById('welcome-text').textContent =
  `Welcome back, ${user?.name || 'Admin'} · ${new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' })}`;

async function loadStats() {
  try {
    const stats = adminGetStats ? await adminGetStats() : null;
    if (!stats) return;
    const grid = document.getElementById('stats-grid');
    grid.innerHTML = `
      <div class="stat-card"><div class="stat-card-icon">👥</div><div class="stat-card-value">${stats.totalUsers}</div><div class="stat-card-label">Total Users</div></div>
      <div class="stat-card"><div class="stat-card-icon">📦</div><div class="stat-card-value">${stats.totalProducts}</div><div class="stat-card-label">Total Products</div></div>
      <div class="stat-card"><div class="stat-card-icon">✅</div><div class="stat-card-value">${stats.activeProducts}</div><div class="stat-card-label">Active Products</div></div>
      <div class="stat-card"><div class="stat-card-icon">🏷️</div><div class="stat-card-value">${stats.totalCategories}</div><div class="stat-card-label">Categories</div></div>
    `;
  } catch (err) {
    showToast('Failed to load stats: ' + err.message, 'error');
  }
}

loadStats();
</script>

</body>
</html>

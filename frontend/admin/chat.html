<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Support — RAIDZONE Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/pages/admin.css"/>
  
  <style>
    .chat-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 24px;
      height: calc(100vh - 120px);
      margin-top: 24px;
    }
    .thread-list {
      background: var(--bg-card, rgba(255,255,255,0.03));
      border: 1px solid var(--border-color, rgba(255,255,255,0.08));
      border-radius: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .thread-item {
      padding: 16px;
      border-bottom: 1px solid var(--border-color, rgba(255,255,255,0.08));
      cursor: pointer;
      transition: background 0.2s;
    }
    .thread-item:hover, .thread-item.active { background: rgba(124,58,237,0.1); }
    .thread-name { font-weight: 600; color: white; display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 14px; }
    .thread-status-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.1); color: #9CA3AF; }
    .status-WAITING_ON_ADMIN { background: rgba(239,68,68,0.2); color: #F87171; }
    .status-WAITING_ON_USER  { background: rgba(16,185,129,0.2); color: #34D399; }
    .status-OPEN             { background: rgba(124,58,237,0.2); color: #C084FC; }
    .unread-badge { background:#EF4444; color:white; border-radius:10px; padding:1px 6px; font-size:10px; font-weight:700; }

    .chat-window {
      background: var(--bg-card, rgba(255,255,255,0.03));
      border: 1px solid var(--border-color, rgba(255,255,255,0.08));
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-win-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color, rgba(255,255,255,0.08));
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.02);
    }
    .chat-win-header h3 { margin: 0; font-size: 16px; color: white; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border-color, rgba(255,255,255,0.08));
      display: flex;
      gap: 12px;
      background: rgba(0,0,0,0.15);
    }
    #chat-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    #chat-input:focus { border-color: #7C3AED; }
    #chat-input:disabled { opacity: 0.5; }
    #chat-send {
      background: linear-gradient(135deg, #7C3AED, #5B21B6);
      color: white; border: none;
      padding: 0 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    #chat-send:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg-row { display: flex; flex-direction: column; max-width: 75%; }
    .msg-row-user { align-self: flex-start; }
    .msg-row-admin { align-self: flex-end; }
    .chat-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
    .msg-row-user .chat-bubble  { background: rgba(255,255,255,0.07); color: #E5E7EB; border-bottom-left-radius: 2px; }
    .msg-row-admin .chat-bubble { background: linear-gradient(135deg, #7C3AED, #5B21B6); color: white; border-bottom-right-radius: 2px; }
    .msg-time { font-size: 10px; color: #6B7280; margin-top: 4px; }
    .msg-row-admin .msg-time { text-align: right; }
    .msg-label { font-size: 10px; color: #9CA3AF; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .chat-placeholder { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#4B5563; gap:12px; }
  </style>
</head>
<body>

<div class="admin-layout">
  <aside class="admin-sidebar"></aside>
  <main class="admin-main">
    <div class="admin-mobile-topbar"><span class="admin-mobile-topbar-title">Live Support</span></div>

    <div class="chat-layout">
      <div class="thread-list" id="thread-list">
        <div style="padding:20px;text-align:center;color:#6B7280;font-size:13px;">Loading threads...</div>
      </div>

      <div class="chat-window">
        <div class="chat-win-header">
          <h3 id="current-thread-name">Select a conversation</h3>
          <div id="current-thread-status"></div>
        </div>
        <div class="chat-messages" id="chat-messages">
          <div class="chat-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span style="font-size:13px;">Select a conversation to start chatting</span>
          </div>
        </div>
        <form class="chat-input-area" id="chat-form">
          <input type="text" id="chat-input" placeholder="Type a reply..." disabled autocomplete="off"/>
          <button type="submit" id="chat-send" disabled>Send</button>
        </form>
      </div>
    </div>
  </main>
</div>

<script src="../js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@5.0.0/bundles/stomp.umd.min.js"></script>

<script type="module">
  import { initAdminSidebar } from './js/adminSidebar.js';
  import { initAuth, isLoggedIn, authFetch, getAccessToken } from '../js/auth.js';

  await initAuth();
  if (!isLoggedIn()) { window.location.href = '../login.html'; }
  await initAdminSidebar('chat');

  let stompClient = null;
  let threads = [];
  let currentThreadId = null;

  async function loadThreads() {
    try {
      const res = await authFetch('/api/v1/chat/admin/threads');
      const json = await res.json();
      threads = json.data || [];
      renderThreads();
    } catch(e) {
      document.getElementById('thread-list').innerHTML =
        `<div style="padding:20px;text-align:center;color:#EF4444;font-size:13px">Failed: ${e.message}</div>`;
    }
  }

  function renderThreads() {
    const container = document.getElementById('thread-list');
    if (!threads.length) {
      container.innerHTML = '<div style="padding:24px;text-align:center;color:#6B7280;font-size:13px">No active conversations yet</div>';
      return;
    }
    container.innerHTML = threads.map(t => {
      const badge = t.unreadCount > 0 ? `<span class="unread-badge">${t.unreadCount}</span>` : '';
      const time  = new Date(t.updatedAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      return `
        <div class="thread-item ${t.id === currentThreadId ? 'active' : ''}" data-id="${t.id}">
          <div class="thread-name">
            <span>${t.userName} ${badge}</span>
            <span style="font-weight:400;font-size:11px;color:#6B7280">${time}</span>
          </div>
          <span class="thread-status-badge status-${t.status}">${t.status.replace(/_/g, ' ')}</span>
        </div>`;
    }).join('');
    container.querySelectorAll('.thread-item').forEach(el =>
      el.addEventListener('click', () => selectThread(el.dataset.id)));
  }

  async function selectThread(id) {
    currentThreadId = id;
    renderThreads();
    const t = threads.find(x => x.id === id);
    document.getElementById('current-thread-name').textContent = t?.userName || 'Chat';
    document.getElementById('current-thread-status').innerHTML =
      t ? `<span class="thread-status-badge status-${t.status}">${t.status.replace(/_/g,' ')}</span>` : '';
    document.getElementById('chat-input').disabled = false;
    document.getElementById('chat-send').disabled = false;
    await authFetch(`/api/v1/chat/threads/${id}/read`, { method: 'POST' });
    if (t) { t.unreadCount = 0; renderThreads(); }
    const msgRes = await authFetch(`/api/v1/chat/threads/${id}/messages`);
    const msgJson = await msgRes.json();
    const msgs = msgJson.data || [];
    const mc = document.getElementById('chat-messages');
    mc.innerHTML = '';
    if (!msgs.length) {
      mc.innerHTML = '<div class="chat-placeholder"><span style="font-size:13px">No messages yet</span></div>';
    } else { msgs.forEach(appendMessage); }
    mc.scrollTop = mc.scrollHeight;
  }

  function appendMessage(msg) {
    const mc = document.getElementById('chat-messages');
    mc.querySelector('.chat-placeholder')?.remove();
    const div = document.createElement('div');
    const time  = new Date(msg.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    div.className = `msg-row ${msg.isAdmin ? 'msg-row-admin' : 'msg-row-user'}`;
    div.innerHTML = `
      <div class="msg-label">${msg.isAdmin ? 'You (Admin)' : msg.senderName}</div>
      <div class="chat-bubble">${msg.content}</div>
      <div class="msg-time">${time}</div>`;
    mc.appendChild(div);
    mc.scrollTop = mc.scrollHeight;
  }

  function connectWS() {
    const token = getAccessToken();
    if (!token) return;
    const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws/websocket';
    console.log('[Chat WS] Connecting to:', wsUrl);

    stompClient = new window.StompJs.Client({
      brokerURL: wsUrl,
      connectHeaders: { 
        Authorization: 'Bearer ' + token,
        authorization: 'Bearer ' + token
      },
      debug: function (str) { console.log('[Chat WS] Debug:', str); },
      reconnectDelay: 5000
    });
    stompClient.onConnect = () => {
      console.log('[Chat WS] Admin Connected');
      stompClient.subscribe('/topic/chat/admin', pack => {
        const msg = JSON.parse(pack.body);
        if (msg.threadId === currentThreadId) {
          appendMessage(msg);
          authFetch(`/api/v1/chat/threads/${currentThreadId}/read`, { method: 'POST' });
        }
        loadThreads();
      });
    };
    stompClient.onStompError = (frame) => {
      console.error('[Chat WS] Admin STOMP Error:', frame.headers['message']);
    };
    stompClient.onWebSocketError = (event) => {
      console.error('[Chat WS] Admin WebSocket Error:', event);
    };
    stompClient.activate();
  }

  document.getElementById('chat-form').addEventListener('submit', e => {
    e.preventDefault();
    const input = document.getElementById('chat-input');
    const txt = input.value.trim();
    if (!txt || !currentThreadId || !stompClient?.connected) return;
    stompClient.publish({
      destination: `/app/chat/${currentThreadId}`,
      headers: { 
        Authorization: 'Bearer ' + getAccessToken(),
        authorization: 'Bearer ' + getAccessToken()
      },
      body: JSON.stringify({ content: txt })
    });
    input.value = '';
  });

  await loadThreads();
  connectWS();
</script>
</body>
</html>

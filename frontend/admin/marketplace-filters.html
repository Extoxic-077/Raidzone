<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Filters Manager — Admin — Raidzone</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/pages/admin.css"/>
  
  <style>
    .manager-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 24px;
      margin-top: 24px;
    }
    
    @media (max-width: 1024px) {
      .manager-grid { grid-template-columns: 1fr; }
    }

    .type-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      padding: 16px;
      margin-bottom: 12px;
      cursor: grab;
      transition: all 0.2s ease;
    }
    .type-card:hover { border-color: var(--violet-light); }
    .type-card.sortable-ghost { opacity: 0.4; background: var(--violet-dark); }

    .blueprint-list {
      min-height: 100px;
      padding: 10px;
      background: rgba(255,255,255,0.02);
      border-radius: var(--r-sm);
      border: 1px dashed var(--glass-border);
    }

    .bp-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg-2);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-sm);
      margin-bottom: 8px;
      font-size: 0.875rem;
    }
    
    .bp-info { display: flex; flex-direction: column; gap: 2px; }
    .bp-name { font-weight: 600; color: var(--text-1); }
    .bp-game { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-4); }

    .tag-input-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
      background: var(--bg-3);
      border-radius: var(--r-sm);
    }
    .tag-chip {
      padding: 2px 8px;
      background: var(--violet-dark);
      color: var(--violet-light);
      border-radius: 12px;
      font-size: 11px;
      display: flex;
      align-items: center; gap: 4px;
    }
  </style>
</head>
<body>

<div class="admin-layout">
  <aside class="admin-sidebar"></aside>

  <main class="admin-main">
    <div class="admin-mobile-topbar"><span class="admin-mobile-topbar-title">Filters Manager</span></div>
    
    <div class="admin-header-flex">
      <div>
        <h1 class="admin-page-title">Dynamic Filter Engine</h1>
        <p class="admin-page-subtitle">Configure per-game/tab filter layouts for the storefront</p>
      </div>
      <div class="admin-header-actions">
        <div style="display:flex; gap:10px; align-items:center;">
          <select id="game-selector" class="admin-form-select">
             <option value="arc-raiders">Arc Raiders</option>
             <option value="cs2">CS2</option>
             <option value="windrose">Windrose</option>
             <option value="delta-force">Delta Force</option>
          </select>
          <select id="tab-selector" class="admin-form-select">
             <option value="items">Items</option>
             <option value="accounts">Accounts</option>
             <option value="coins">Coins/Currency</option>
          </select>
          <button class="btn-admin-primary" id="add-filter-btn">Add New Filter</button>
        </div>
      </div>
    </div>

    <div class="admin-card" style="margin-top: 24px;">
      <div class="admin-card-header">
        <h3 class="admin-card-title">Filter Layout Configurator</h3>
        <div class="admin-card-actions">
          <button class="btn-admin-primary" id="save-config-btn" style="background: var(--violet-light); color: #fff;">Save Changes</button>
        </div>
      </div>
      <div id="dynamic-filter-list" class="sortable-list" style="padding: 20px;">
        <!-- Dynamic Filter Rows will be injected here -->
        <div id="empty-config" style="padding: 40px; text-align: center; color: var(--text-4);">
           No filters configured for this selection. Click "Add New Filter" to begin.
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modals for CRUD -->
<div class="admin-modal-overlay" id="type-modal">
  <div class="admin-modal" style="max-width:400px">
     <h2 class="admin-modal-title">Item Type</h2>
     <form id="type-form">
       <div class="admin-form-group">
         <label class="admin-form-label">Type Name</label>
         <input class="admin-form-input" name="name" required placeholder="e.g. Traps"/>
       </div>
       <div class="admin-form-group">
         <label class="admin-form-label">Slug</label>
         <input class="admin-form-input" name="slug" required placeholder="e.g. traps"/>
       </div>
       <div class="admin-modal-footer">
          <button type="button" class="btn-admin-cancel" onclick="closeModals()">Cancel</button>
          <button type="submit" class="btn-admin-primary">Save Type</button>
       </div>
     </form>
  </div>
</div>

<div class="admin-modal-overlay" id="blueprint-modal">
  <div class="admin-modal" style="max-width:500px">
     <h2 class="admin-modal-title">New Blueprint</h2>
     <form id="blueprint-form">
       <div class="admin-form-grid">
          <div class="admin-form-group full">
            <label class="admin-form-label">Blueprint Name</label>
            <input class="admin-form-input" name="name" required placeholder="e.g. Gas Mine Blueprint"/>
          </div>
          <div class="admin-form-group">
            <label class="admin-form-label">Game</label>
            <select class="admin-form-select" name="game" required>
              <option value="arc-raiders">Arc Raiders</option>
              <option value="cs2">CS2</option>
            </select>
          </div>
          <div class="admin-form-group">
            <label class="admin-form-label">Item Type</label>
            <select class="admin-form-select" name="itemType" id="type-select" required>
              <!-- Populated via JS -->
            </select>
          </div>
          <div class="admin-form-group full">
            <label class="admin-form-label">Keywords (for classification)</label>
            <input class="admin-form-input" name="keywords" placeholder="mine, gas, trap (comma separated)"/>
          </div>
       </div>
       <div class="admin-modal-footer">
          <button type="button" class="btn-admin-cancel" onclick="closeModals()">Cancel</button>
          <button type="submit" class="btn-admin-primary">Add Blueprint</button>
       </div>
     </form>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script type="module" src="./js/pages/filtersFinal.js?v=999"></script>
</body>
</html>

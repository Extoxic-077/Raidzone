<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Companies — Admin — Raidzone</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/animations.css"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/pages/admin.css"/>
</head>
<body>

<div class="admin-layout">
  <aside class="admin-sidebar"></aside>

  <main class="admin-main">
    <div class="admin-mobile-topbar"><span class="admin-mobile-topbar-title">Companies</span></div>
    <h1 class="admin-page-title" style="margin-top:28px">Companies / Brands</h1>
    <p class="admin-page-subtitle">Manage brands shown in Featured Brands and product filters</p>

    <div class="admin-table-card">
      <div class="admin-table-header">
        <div class="admin-table-title" id="company-count">Companies</div>
        <button class="btn-admin-primary" id="add-company-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Company
        </button>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr><th>Name</th><th>Slug</th><th>Website</th><th>Order</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="company-tbody">
            <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-3)">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Company Modal -->
<div class="admin-modal-overlay" id="company-modal">
  <div class="admin-modal" style="max-width:500px">
    <h2 class="admin-modal-title" id="modal-title">Add Company</h2>
    <form id="company-form">
      <div class="admin-form-grid">
        <div class="admin-form-group">
          <label class="admin-form-label">Name *</label>
          <input class="admin-form-input" name="name" required placeholder="e.g. Riot Games"/>
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Slug *</label>
          <input class="admin-form-input" name="slug" required placeholder="e.g. riot-games"/>
        </div>
        <div class="admin-form-group full">
          <label class="admin-form-label">Logo URL</label>
          <input class="admin-form-input" name="logoUrl" placeholder="https://…/logo.png"/>
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Website URL</label>
          <input class="admin-form-input" name="websiteUrl" placeholder="https://riotgames.com"/>
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Sort Order</label>
          <input class="admin-form-input" name="sortOrder" type="number" value="0" min="0"/>
        </div>
        <div class="admin-form-group full">
          <label class="admin-form-label">Description</label>
          <textarea class="admin-form-textarea" name="description" rows="2" placeholder="Short description…"></textarea>
        </div>
        <div class="admin-form-group full">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--text-2);font-size:0.875rem;">
            <input type="checkbox" name="isActive" checked style="width:16px;height:16px;accent-color:var(--violet)"/>
            Active (visible on storefront)
          </label>
        </div>
      </div>
      <div class="admin-modal-footer">
        <button type="button" class="btn-admin-cancel" id="modal-cancel">Cancel</button>
        <button type="submit" class="btn-admin-primary" id="modal-submit">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Mobile bottom nav -->
<nav class="admin-bottom-nav">
  <a href="index.html" class="admin-bottom-tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Analytics
  </a>
  <a href="products.html" class="admin-bottom-tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
    Products
  </a>
  <a href="categories.html" class="admin-bottom-tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Categories
  </a>
  <a href="users.html" class="admin-bottom-tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
    Users
  </a>
</nav>

<div id="toast-container"></div>

<script src="../js/config.js"></script>
<script type="module">
import { showToast } from '../js/components/toast.js';
import { initAuth, isLoggedIn, isAdmin } from '../js/auth.js';
import { initAdminSidebar } from './js/adminSidebar.js';
import { adminGetCompanies, adminCreateCompany, adminUpdateCompany, adminDeleteCompany } from '../js/api.js';

await initAuth();
if (!isLoggedIn() || !isAdmin()) window.location.href = '../login.html';
await initAdminSidebar('companies');

let editingId = null;
let cache = {};
const tbody = document.getElementById('company-tbody');
const modal = document.getElementById('company-modal');
const form  = document.getElementById('company-form');

form.elements['name'].addEventListener('input', () => {
  if (editingId) return;
  form.elements['slug'].value = form.elements['name'].value
    .toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
});

async function loadCompanies() {
  tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-3)">Loading…</td></tr>`;
  try {
    const companies = await adminGetCompanies();
    document.getElementById('company-count').textContent = `Companies (${companies.length})`;
    cache = {};
    companies.forEach(c => { cache[c.id] = c; });
    renderTable(companies);
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="6" style="color:var(--danger);padding:24px;text-align:center">${err.message}</td></tr>`;
  }
}

function renderTable(companies) {
  if (!companies.length) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-3)">No companies yet</td></tr>`;
    return;
  }
  tbody.innerHTML = companies.map(c => {
    const status = c.isActive !== false
      ? `<span class="admin-badge badge-active">Active</span>`
      : `<span class="admin-badge badge-inactive">Inactive</span>`;
    return `
      <tr>
        <td>
          ${c.logoUrl ? `<img src="${c.logoUrl}" style="width:24px;height:24px;object-fit:contain;border-radius:4px;margin-right:8px;vertical-align:middle;" onerror="this.style.display='none'"/>` : ''}
          <span style="color:var(--text-1);font-weight:500">${c.name}</span>
        </td>
        <td style="font-size:0.8rem;color:var(--text-4)">${c.slug}</td>
        <td style="font-size:0.8rem;color:var(--violet-light)">${c.websiteUrl ? `<a href="${c.websiteUrl}" target="_blank" style="color:inherit;text-decoration:none;">↗</a>` : '—'}</td>
        <td style="color:var(--text-3)">${c.sortOrder ?? 0}</td>
        <td>${status}</td>
        <td>
          <div class="admin-actions-cell">
            <button class="btn-table-action" onclick="openEdit('${c.id}')">Edit</button>
            <button class="btn-table-action danger" onclick="deleteCompany('${c.id}','${c.name.replace(/'/g,'')}')">Deactivate</button>
          </div>
        </td>
      </tr>`;
  }).join('');
}

function openAdd() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add Company';
  form.reset();
  form.elements['isActive'].checked = true;
  modal.classList.add('open');
}

window.openEdit = function(id) {
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Company';
  const c = cache[id];
  if (c) {
    form.elements['name'].value        = c.name || '';
    form.elements['slug'].value        = c.slug || '';
    form.elements['logoUrl'].value     = c.logoUrl || '';
    form.elements['websiteUrl'].value  = c.websiteUrl || '';
    form.elements['sortOrder'].value   = c.sortOrder ?? 0;
    form.elements['description'].value = c.description || '';
    form.elements['isActive'].checked  = c.isActive !== false;
  }
  modal.classList.add('open');
};

window.deleteCompany = async function(id, name) {
  if (!confirm(`Deactivate company "${name}"?`)) return;
  try {
    await adminDeleteCompany(id);
    showToast(`"${name}" deactivated`, 'info');
    loadCompanies();
  } catch (err) { showToast(err.message, 'error'); }
};

document.getElementById('add-company-btn').addEventListener('click', openAdd);
document.getElementById('modal-cancel').addEventListener('click', () => modal.classList.remove('open'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

form.addEventListener('submit', async e => {
  e.preventDefault();
  const fd  = new FormData(form);
  const btn = document.getElementById('modal-submit');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  const data = {
    name:        fd.get('name'),
    slug:        fd.get('slug'),
    logoUrl:     fd.get('logoUrl') || null,
    websiteUrl:  fd.get('websiteUrl') || null,
    description: fd.get('description') || null,
    sortOrder:   parseInt(fd.get('sortOrder')) || 0,
    isActive:    form.elements['isActive'].checked,
  };

  try {
    if (editingId) {
      await adminUpdateCompany(editingId, data);
      showToast('Company updated', 'success');
    } else {
      await adminCreateCompany(data);
      showToast('Company created', 'success');
    }
    modal.classList.remove('open');
    loadCompanies();
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save';
  }
});

loadCompanies();
</script>
</body>
</html>

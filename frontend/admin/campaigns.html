<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Campaigns — Raidzone Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/pages/admin.css"/>
  <style>
    body { background: var(--bg0); color: var(--text-1); font-family: var(--font-body); min-height: 100vh; }
    .admin-layout { display: flex; min-height: 100vh; }
    .camp-main { flex: 1; padding: 32px; max-width: 820px; margin: 0 auto; }
    .camp-title { font-family: var(--font-heading); font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
    .camp-sub { color: var(--text-3); font-size: 14px; margin-bottom: 28px; }

    .stats-row { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-card {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--r-lg); padding: 16px 24px; min-width: 160px;
    }
    .stat-val { font-size: 2rem; font-weight: 800; font-family: var(--font-mono); color: var(--violet-light); }
    .stat-lbl { font-size: 12px; color: var(--text-3); margin-top: 4px; }

    .compose-box {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: var(--r-lg); padding: 28px;
    }
    .compose-title { font-weight: 700; font-size: 16px; margin-bottom: 20px; }

    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .field input, .field textarea {
      width: 100%; box-sizing: border-box;
      background: var(--bg2); border: 1px solid var(--glass-border);
      border-radius: var(--r-md); color: var(--text-1); padding: 11px 14px;
      font-size: 14px; font-family: var(--font-body); outline: none;
    }
    .field input:focus, .field textarea:focus { border-color: var(--primary); }
    .field textarea { min-height: 220px; resize: vertical; font-family: var(--font-mono); font-size: 13px; line-height: 1.6; }

    .checkbox-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .checkbox-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
    .checkbox-row label { font-size: 14px; color: var(--text-2); cursor: pointer; }

    .preview-wrap {
      margin-bottom: 20px;
      background: var(--bg2); border: 1px solid var(--glass-border);
      border-radius: var(--r-md); overflow: hidden;
    }
    .preview-header {
      padding: 8px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-3); border-bottom: 1px solid var(--glass-border);
      display: flex; justify-content: space-between; align-items: center;
    }
    #preview-frame { width: 100%; height: 340px; border: none; background: #fff; }

    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .btn-send {
      padding: 11px 28px; background: var(--gradient); border: none;
      border-radius: var(--r-full); color: #fff; font-weight: 700;
      font-size: 14px; cursor: pointer; transition: opacity .15s;
    }
    .btn-send:hover { opacity: .85; }
    .btn-send:disabled { opacity: .5; cursor: not-allowed; }
    .btn-preview {
      padding: 11px 22px; background: transparent;
      border: 1px solid var(--glass-border); border-radius: var(--r-full);
      color: var(--text-2); font-size: 14px; font-weight: 600; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .btn-preview:hover { border-color: var(--primary); color: var(--text-1); }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar"></aside>
  <div class="admin-content">
  <div class="admin-mobile-topbar"><span class="admin-mobile-topbar-title">Email Campaigns</span></div>
  <div class="camp-main">
    <h1 class="camp-title">Email Campaigns</h1>
    <p class="camp-sub">Compose and send newsletters to your subscribers.</p>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="sub-count">—</div>
        <div class="stat-lbl">Active Subscribers</div>
      </div>
    </div>

    <div class="compose-box">
      <div class="compose-title">Compose Campaign</div>

      <div class="field">
        <label>Subject Line</label>
        <input id="subject" type="text" placeholder="e.g. New arrivals this week on Raidzone ✨" maxlength="200"/>
      </div>

      <div class="field">
        <label>Body (HTML)</label>
        <textarea id="body" placeholder="<h2>Big news!</h2><p>We just added...</p>"></textarea>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="include-registered" checked/>
        <label for="include-registered">Also send to registered users who have not unsubscribed</label>
      </div>

      <div class="preview-wrap" id="preview-wrap" style="display:none">
        <div class="preview-header">
          <span>Preview</span>
          <span id="preview-subject-label" style="color:var(--text-2)"></span>
        </div>
        <iframe id="preview-frame" title="Email preview" sandbox="allow-same-origin"></iframe>
      </div>

      <div class="btn-row">
        <button class="btn-send" id="send-btn">Send Campaign</button>
        <button class="btn-preview" id="preview-btn">Preview</button>
      </div>
    </div>
  </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="/js/config.js"></script>
<script type="module">
import { initAuth, isLoggedIn, isAdmin, authFetch } from '../js/auth.js';
import { showToast } from '../js/components/toast.js';
import { initAdminSidebar } from './js/adminSidebar.js';

await initAuth();
if (!isLoggedIn() || !isAdmin()) { window.location.href = '../login.html'; }
await initAdminSidebar('campaigns');

const API = window.__API_BASE__ || '/api';

async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  const res = await authFetch(`${API}${path}`, { ...opts, headers });
  const text = await res.text();
  const json = text ? JSON.parse(text) : {};
  if (!res.ok) throw new Error(json.message || `Error ${res.status}`);
  return json.data;
}

// Load subscriber count
try {
  const data = await apiFetch('/admin/campaigns/subscriber-count');
  document.getElementById('sub-count').textContent = data.count ?? 0;
} catch (e) {
  document.getElementById('sub-count').textContent = '—';
}

// Preview
document.getElementById('preview-btn').addEventListener('click', () => {
  const subject = document.getElementById('subject').value.trim();
  const body    = document.getElementById('body').value.trim();
  const wrap    = document.getElementById('preview-wrap');
  const frame   = document.getElementById('preview-frame');
  const lbl     = document.getElementById('preview-subject-label');

  if (!body) { showToast('Enter body HTML first', 'error'); return; }
  wrap.style.display = '';
  lbl.textContent = subject || '(no subject)';
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>body{margin:0;background:#fff;font-family:Arial,sans-serif;font-size:15px;color:#111;}</style></head><body>${body}</body></html>`);
  doc.close();
});

// Send
document.getElementById('send-btn').addEventListener('click', async () => {
  const subject          = document.getElementById('subject').value.trim();
  const htmlBody         = document.getElementById('body').value.trim();
  const includeRegistered = document.getElementById('include-registered').checked;

  if (!subject) { showToast('Subject is required', 'error'); return; }
  if (!htmlBody) { showToast('Body is required', 'error'); return; }

  const btn = document.getElementById('send-btn');
  btn.disabled = true; btn.textContent = 'Sending…';

  try {
    const msg = await apiFetch('/admin/campaigns/send', {
      method: 'POST',
      body: JSON.stringify({ subject, htmlBody, includeRegistered }),
    });
    showToast(msg, 'success');
    document.getElementById('subject').value = '';
    document.getElementById('body').value = '';
    document.getElementById('preview-wrap').style.display = 'none';
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Send Campaign';
  }
});
</script>
</body>
</html>

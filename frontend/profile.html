<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile — RAIDZONE</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.v5.css?v=2.1.0"/>
  <link rel="stylesheet" href="css/animations.css?v=2.1.0"/>
  <link rel="stylesheet" href="css/base.css?v=2.1.0"/>
  <link rel="stylesheet" href="css/components.v5.css?v=2.1.0"/>
  <link rel="stylesheet" href="css/pages/auth.css?v=2.1.0"/>
<link rel="stylesheet" href="/css/rz-header.v5.css?v=5.0.0"></head>
<body>

  <!-- Navbar mount -->
  <div id="navbar"></div>

  <!-- Profile content -->
  <div class="profile-page" id="profile-root">
    <!-- Rendered by JS -->
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

<script src="/js/config.js"></script>
<script type="module">
import { initNavbar } from './js/components/rz-nav.js?v=1.1.0';
import { initFooter } from './js/components/rz-foot.js?v=1.1.0';
import { showToast }  from './js/components/toast.js';
import { initAuth, isLoggedIn, getUser, clearAuth, setAuth } from './js/auth.js';
import { logout, updateMe, requestEmailChange, verifyEmailChange, requestPasswordChange, verifyPasswordChange } from './js/api.js';

// ── Auth guard ──────────────────────────────────────────────────────────────
initNavbar();
await initAuth();
if (!isLoggedIn()) {
  sessionStorage.setItem('redirectAfterLogin', 'profile.html');
  window.location.href = 'login.html';
}

// ── Render profile ──────────────────────────────────────────────────────────

function formatDate(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  } catch { return '—'; }
}

function renderProfile() {
  const user = getUser();
  if (!user) return;

  const root = document.getElementById('profile-root');
  const initial = (user.name || 'U')[0].toUpperCase();
  const roleBadgeClass = user.role === 'ADMIN' ? 'role-admin' : 'role-user';

  root.innerHTML = `
    <div class="profile-header">
      <div class="profile-avatar-lg">${initial}</div>
      <div class="profile-header-info">
        <div class="profile-name">${user.name || '—'}</div>
        <div class="profile-email-text">${user.email || '—'}</div>
        <div class="profile-badges">
          <span class="profile-badge ${roleBadgeClass}">${user.role || 'USER'}</span>
          <span class="profile-badge verified">Verified</span>
        </div>
      </div>
    </div>

    <!-- Account Info -->
    <div class="profile-section">
      <div class="profile-section-title">Account Information</div>
      <div class="profile-fields">
        <div class="profile-field">
          <div class="profile-field-label">Full Name</div>
          <div class="profile-field-value">${user.name || '—'}</div>
        </div>
        <div class="profile-field">
          <div class="profile-field-label">Email Address</div>
          <div class="profile-field-value">${user.email || '—'}</div>
        </div>
        <div class="profile-field">
          <div class="profile-field-label">Phone</div>
          <div class="profile-field-value ${!user.phone ? 'empty' : ''}">${user.phone || 'Not set'}</div>
        </div>
        <div class="profile-field">
          <div class="profile-field-label">Nickname</div>
          <div class="profile-field-value ${!user.nickname ? 'empty' : ''}">${user.nickname || 'Not set'}</div>
        </div>
        <div class="profile-field">
          <div class="profile-field-label">Member Since</div>
          <div class="profile-field-value">${formatDate(user.createdAt)}</div>
        </div>
        <div class="profile-field">
          <div class="profile-field-label">Auth Provider</div>
          <div class="profile-field-value">${user.provider || 'LOCAL'}</div>
        </div>
      </div>
      <button class="btn-profile-action" id="edit-profile-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit Profile
      </button>
    </div>

    <!-- Security -->
    <div class="profile-section">
      <div class="profile-section-title">Security</div>
      <div class="profile-fields">
        <div class="profile-field">
          <div class="profile-field-label">Password</div>
          <div class="profile-field-value">••••••••</div>
        </div>
        <div class="profile-field">
          <div class="profile-field-label">Two-Factor Auth</div>
          <div class="profile-field-value empty">Not enabled</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn-profile-action" id="change-email-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Change Email
        </button>
        <button class="btn-profile-action" id="change-password-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Change Password
        </button>
      </div>
    </div>

    <!-- Order History -->
    <div class="profile-section">
      <div class="profile-section-title">Order History</div>
      <div class="profile-empty-state">
        <div class="profile-empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><path d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></div>
        <p>Your order history will appear here once you make a purchase.</p>
      </div>
    </div>
  `;

  document.title = `${user.name} — RAIDZONE`;

  document.getElementById('edit-profile-btn')?.addEventListener('click', () => {
    openEditModal(user);
  });

  document.getElementById('change-email-btn')?.addEventListener('click', () => {
    openChangeEmailModal(user);
  });

  document.getElementById('change-password-btn')?.addEventListener('click', () => {
    openChangePasswordModal(user);
  });
}

// ── Change Email modal ──────────────────────────────────────────────────────

function openChangeEmailModal(user) {
  const existing = document.getElementById('change-email-modal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'change-email-modal';
  modal.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;
    justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(4px);
  `;

  modal.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--glass-border);border-radius:var(--r-xl);width:100%;max-width:420px;padding:28px;">
      <h2 style="font-family:var(--font-display);font-size:1.2rem;color:var(--text-1);margin:0 0 8px">Change Email</h2>
      <p style="font-size:.85rem;color:var(--text-3);margin:0 0 20px">
        Enter your new email address. We'll send a verification code to confirm it's real.
      </p>

      <!-- Step 1: enter new email -->
      <div id="email-step-1">
        <div style="margin-bottom:14px">
          <label style="font-size:.8rem;color:var(--text-3);display:block;margin-bottom:6px">New Email Address</label>
          <input id="new-email-input" type="email" placeholder="new@example.com"
            style="width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--glass-border);border-radius:var(--r-md);color:var(--text-1);padding:10px 14px;font-size:.9rem;outline:none;"/>
        </div>
        <div style="display:flex;gap:12px;justify-content:flex-end;">
          <button id="cancel-email-btn" style="padding:10px 20px;background:transparent;border:1px solid var(--glass-border);border-radius:var(--r-full);color:var(--text-3);cursor:pointer;font-size:.875rem;">Cancel</button>
          <button id="send-email-code-btn" style="padding:10px 20px;background:var(--gradient);border:none;border-radius:var(--r-full);color:#fff;font-weight:700;cursor:pointer;font-size:.875rem;">Send Code</button>
        </div>
      </div>

      <!-- Step 2: verify OTP -->
      <div id="email-step-2" style="display:none">
        <p id="email-sent-hint" style="font-size:.85rem;color:var(--text-3);margin:0 0 14px"></p>
        <div style="margin-bottom:14px">
          <label style="font-size:.8rem;color:var(--text-3);display:block;margin-bottom:6px">Verification Code</label>
          <input id="email-otp-input" type="text" inputmode="numeric" maxlength="6" placeholder="6-digit code"
            style="width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--glass-border);border-radius:var(--r-md);color:var(--text-1);padding:10px 14px;font-size:1.1rem;letter-spacing:8px;outline:none;text-align:center;"/>
        </div>
        <div style="display:flex;gap:12px;justify-content:flex-end;">
          <button id="back-email-btn" style="padding:10px 20px;background:transparent;border:1px solid var(--glass-border);border-radius:var(--r-full);color:var(--text-3);cursor:pointer;font-size:.875rem;">Back</button>
          <button id="verify-email-btn" style="padding:10px 20px;background:var(--gradient);border:none;border-radius:var(--r-full);color:#fff;font-weight:700;cursor:pointer;font-size:.875rem;">Verify & Save</button>
        </div>
      </div>
    </div>`;

  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

  let pendingNewEmail = '';

  document.getElementById('cancel-email-btn').addEventListener('click', () => modal.remove());

  document.getElementById('send-email-code-btn').addEventListener('click', async () => {
    const input = document.getElementById('new-email-input');
    const newEmail = input.value.trim();
    if (!newEmail || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newEmail)) {
      showToast('Please enter a valid email address', 'error');
      return;
    }
    const btn = document.getElementById('send-email-code-btn');
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
      await requestEmailChange(newEmail);
      pendingNewEmail = newEmail;
      const masked = newEmail.charAt(0) + '***@' + newEmail.split('@')[1];
      document.getElementById('email-sent-hint').textContent =
        `A 6-digit code was sent to ${masked}. Enter it below.`;
      document.getElementById('email-step-1').style.display = 'none';
      document.getElementById('email-step-2').style.display = 'block';
      document.getElementById('email-otp-input').focus();
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false; btn.textContent = 'Send Code';
    }
  });

  document.getElementById('back-email-btn').addEventListener('click', () => {
    document.getElementById('email-step-1').style.display = 'block';
    document.getElementById('email-step-2').style.display = 'none';
  });

  document.getElementById('verify-email-btn').addEventListener('click', async () => {
    const otp = document.getElementById('email-otp-input').value.trim();
    if (otp.length !== 6) { showToast('Enter the 6-digit code', 'error'); return; }
    const btn = document.getElementById('verify-email-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const updated = await verifyEmailChange(pendingNewEmail, otp);
      const stored = JSON.parse(sessionStorage.getItem('hv_user') || '{}');
      sessionStorage.setItem('hv_user', JSON.stringify({ ...stored, ...updated }));
      modal.remove();
      showToast('Email updated successfully', 'success');
      renderProfile();
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false; btn.textContent = 'Verify & Save';
    }
  });
}

// ── Change Password modal ───────────────────────────────────────────────────

function openChangePasswordModal(user) {
  const existing = document.getElementById('change-password-modal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'change-password-modal';
  modal.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;
    justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(4px);
  `;

  modal.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--glass-border);border-radius:var(--r-xl);width:100%;max-width:420px;padding:28px;">
      <h2 style="font-family:var(--font-display);font-size:1.2rem;color:var(--text-1);margin:0 0 8px">Change Password</h2>

      <!-- Loading state -->
      <div id="pw-loading" style="text-align:center;padding:20px 0;color:var(--text-3);font-size:.9rem">
        Sending verification code to your email…
      </div>

      <!-- Step: enter new password + OTP -->
      <div id="pw-step" style="display:none">
        <p id="pw-sent-hint" style="font-size:.85rem;color:var(--text-3);margin:0 0 14px"></p>
        <div style="margin-bottom:14px">
          <label style="font-size:.8rem;color:var(--text-3);display:block;margin-bottom:6px">New Password</label>
          <input id="new-password-input" type="password" placeholder="At least 8 characters" minlength="8"
            style="width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--glass-border);border-radius:var(--r-md);color:var(--text-1);padding:10px 14px;font-size:.9rem;outline:none;"/>
        </div>
        <div style="margin-bottom:14px">
          <label style="font-size:.8rem;color:var(--text-3);display:block;margin-bottom:6px">Verification Code</label>
          <input id="pw-otp-input" type="text" inputmode="numeric" maxlength="6" placeholder="6-digit code"
            style="width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--glass-border);border-radius:var(--r-md);color:var(--text-1);padding:10px 14px;font-size:1.1rem;letter-spacing:8px;outline:none;text-align:center;"/>
        </div>
        <div style="display:flex;gap:12px;justify-content:flex-end;">
          <button id="cancel-pw-btn" style="padding:10px 20px;background:transparent;border:1px solid var(--glass-border);border-radius:var(--r-full);color:var(--text-3);cursor:pointer;font-size:.875rem;">Cancel</button>
          <button id="save-pw-btn" style="padding:10px 20px;background:var(--gradient);border:none;border-radius:var(--r-full);color:#fff;font-weight:700;cursor:pointer;font-size:.875rem;">Save Password</button>
        </div>
      </div>
    </div>`;

  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

  // Immediately request OTP on modal open
  requestPasswordChange().then(data => {
    const masked = data?.maskedEmail || '***';
    document.getElementById('pw-sent-hint').textContent =
      `A verification code was sent to ${masked}. Enter it below along with your new password.`;
    document.getElementById('pw-loading').style.display = 'none';
    document.getElementById('pw-step').style.display = 'block';
    document.getElementById('new-password-input').focus();
  }).catch(err => {
    showToast(err.message, 'error');
    modal.remove();
  });

  document.getElementById('cancel-pw-btn')?.addEventListener('click', () => modal.remove());

  document.getElementById('save-pw-btn')?.addEventListener('click', async () => {
    const newPw  = document.getElementById('new-password-input').value;
    const otp    = document.getElementById('pw-otp-input').value.trim();
    if (newPw.length < 8) { showToast('Password must be at least 8 characters', 'error'); return; }
    if (otp.length !== 6) { showToast('Enter the 6-digit code', 'error'); return; }
    const btn = document.getElementById('save-pw-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await verifyPasswordChange(newPw, otp);
      modal.remove();
      showToast('Password changed successfully', 'success');
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false; btn.textContent = 'Save Password';
    }
  });
}

function openEditModal(user) {
  const existing = document.getElementById('edit-profile-modal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'edit-profile-modal';
  modal.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;
    justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(4px);
  `;
  modal.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--glass-border);border-radius:var(--r-xl);width:100%;max-width:420px;padding:28px;">
      <h2 style="font-family:var(--font-display);font-size:1.2rem;color:var(--text-1);margin:0 0 20px">Edit Profile</h2>
      <form id="edit-profile-form" style="display:flex;flex-direction:column;gap:14px;">
        <div>
          <label style="font-size:.8rem;color:var(--text-3);display:block;margin-bottom:6px">Full Name</label>
          <input name="name" value="${user.name || ''}" required
            style="width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--glass-border);border-radius:var(--r-md);color:var(--text-1);padding:10px 14px;font-size:.9rem;outline:none;"/>
        </div>
        <div>
          <label style="font-size:.8rem;color:var(--text-3);display:block;margin-bottom:6px">Phone</label>
          <input name="phone" value="${user.phone || ''}" placeholder="Optional"
            style="width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--glass-border);border-radius:var(--r-md);color:var(--text-1);padding:10px 14px;font-size:.9rem;outline:none;"/>
        </div>
        <div>
          <label style="font-size:.8rem;color:var(--text-3);display:block;margin-bottom:6px">Nickname</label>
          <input name="nickname" value="${user.nickname || ''}" placeholder="Optional"
            style="width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--glass-border);border-radius:var(--r-md);color:var(--text-1);padding:10px 14px;font-size:.9rem;outline:none;"/>
        </div>
        <div>
          <label style="font-size:.8rem;color:var(--text-3);display:block;margin-bottom:6px">Postal Code (PIN)</label>
          <input name="postalCode" value="${user.postalCode || ''}" placeholder="6-digit PIN code"
            inputmode="numeric" maxlength="6" pattern="[0-9]{6}"
            style="width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--glass-border);border-radius:var(--r-md);color:var(--text-1);padding:10px 14px;font-size:.9rem;outline:none;font-family:var(--font-mono);letter-spacing:4px;"/>
        </div>
        <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:8px;">
          <button type="button" id="cancel-edit-btn"
            style="padding:10px 20px;background:transparent;border:1px solid var(--glass-border);border-radius:var(--r-full);color:var(--text-3);cursor:pointer;font-size:.875rem;">
            Cancel
          </button>
          <button type="submit" id="save-edit-btn"
            style="padding:10px 20px;background:var(--gradient);border:none;border-radius:var(--r-full);color:#fff;font-weight:700;cursor:pointer;font-size:.875rem;">
            Save Changes
          </button>
        </div>
      </form>
    </div>`;

  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  document.getElementById('cancel-edit-btn').addEventListener('click', () => modal.remove());

  document.getElementById('edit-profile-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const btn = document.getElementById('save-edit-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const pin = fd.get('postalCode')?.replace(/\D/g, '') || '';
    if (pin && pin.length !== 6) {
      showToast('PIN code must be exactly 6 digits', 'error');
      btn.disabled = false; btn.textContent = 'Save Changes';
      return;
    }
    const updated = await updateMe({
        name:       fd.get('name') || undefined,
        phone:      fd.get('phone') || undefined,
        nickname:   fd.get('nickname') || undefined,
        postalCode: pin || undefined,
      });
      // Update sessionStorage with new user data
      const stored = JSON.parse(sessionStorage.getItem('hv_user') || '{}');
      sessionStorage.setItem('hv_user', JSON.stringify({ ...stored, ...updated }));
      modal.remove();
      showToast('Profile updated', 'success');
      renderProfile();
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false; btn.textContent = 'Save Changes';
    }
  });
}

renderProfile();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile — NexVault</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/pages/auth.css"/>
</head>
<body>

  <!-- Navbar mount -->
  <div id="navbar"></div>

  <!-- Profile content -->
  <div class="profile-page" id="profile-root">
    <!-- Rendered by JS -->
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>
  <div id="bottom-nav"></div>

<script src="/js/config.js"></script>
<script type="module">
import { initNavbar } from './js/components/navbar.js';
import { initFooter } from './js/components/footer.js';
import { showToast }  from './js/components/toast.js';
import { initAuth, isLoggedIn, getUser, clearAuth, setAuth } from './js/auth.js';
import { logout, updateMe } from './js/api.js';

// ── Auth guard ──────────────────────────────────────────────────────────────
await initAuth();
if (!isLoggedIn()) {
  sessionStorage.setItem('redirectAfterLogin', 'profile.html');
  window.location.href = 'login.html';
}

await initNavbar();

// ── Render profile ──────────────────────────────────────────────────────────

function formatDate(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' });
  } catch { return '—'; }
}

function renderProfile() {
  const user = getUser();
  if (!user) return;

  const root = document.getElementById('profile-root');
  const initial = (user.name || 'U')[0].toUpperCase();
  const roleBadgeClass = user.role === 'ADMIN' ? 'role-admin' : 'role-user';

  root.innerHTML = `
    <div class="profile-header">
      <div class="profile-avatar-lg">${initial}</div>
      <div class="profile-header-info">
        <div class="profile-name">${user.name || '—'}</div>
        <div class="profile-email-text">${user.email || '—'}</div>
        <div class="profile-badges">
          <span class="profile-badge ${roleBadgeClass}">${user.role || 'USER'}</span>
          <span class="profile-badge verified">Verified</span>
        </div>
      </div>
    </div>

    <!-- Account Info -->
    <div class="profile-section">
      <div class="profile-section-title">Account Information</div>
      <div class="profile-fields">
        <div class="profile-field">
          <div class="profile-field-label">Full Name</div>
          <div class="profile-field-value">${user.name || '—'}</div>
        </div>
        <div class="profile-field">
          <div class="profile-field-label">Email Address</div>
          <div class="profile-field-value">${user.email || '—'}</div>
        </div>
        <div class="profile-field">
          <div class="profile-field-label">Phone</div>
          <div class="profile-field-value ${!user.phone ? 'empty' : ''}">${user.phone || 'Not set'}</div>
        </div>
        <div class="profile-field">
          <div class="profile-field-label">Nickname</div>
          <div class="profile-field-value ${!user.nickname ? 'empty' : ''}">${user.nickname || 'Not set'}</div>
        </div>
        <div class="profile-field">
          <div class="profile-field-label">Member Since</div>
          <div class="profile-field-value">${formatDate(user.createdAt)}</div>
        </div>
        <div class="profile-field">
          <div class="profile-field-label">Auth Provider</div>
          <div class="profile-field-value">${user.provider || 'LOCAL'}</div>
        </div>
      </div>
      <button class="btn-profile-action" id="edit-profile-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit Profile
      </button>
    </div>

    <!-- Security -->
    <div class="profile-section">
      <div class="profile-section-title">Security</div>
      <div class="profile-fields">
        <div class="profile-field">
          <div class="profile-field-label">Password</div>
          <div class="profile-field-value">••••••••</div>
        </div>
        <div class="profile-field">
          <div class="profile-field-label">Two-Factor Auth</div>
          <div class="profile-field-value empty">Not enabled</div>
        </div>
      </div>
      <button class="btn-profile-action" disabled title="Coming soon — Phase 5">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Change Password
      </button>
    </div>

    <!-- Order History -->
    <div class="profile-section">
      <div class="profile-section-title">Order History</div>
      <div class="profile-empty-state">
        <div class="profile-empty-icon">📦</div>
        <p>Your order history will appear here once you make a purchase.</p>
      </div>
    </div>
  `;

  document.title = `${user.name} — NexVault`;

  document.getElementById('edit-profile-btn')?.addEventListener('click', () => {
    openEditModal(user);
  });
}

function openEditModal(user) {
  const existing = document.getElementById('edit-profile-modal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'edit-profile-modal';
  modal.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;
    justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(4px);
  `;
  modal.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--glass-border);border-radius:var(--r-xl);width:100%;max-width:420px;padding:28px;">
      <h2 style="font-family:var(--font-display);font-size:1.2rem;color:var(--text-1);margin:0 0 20px">Edit Profile</h2>
      <form id="edit-profile-form" style="display:flex;flex-direction:column;gap:14px;">
        <div>
          <label style="font-size:.8rem;color:var(--text-3);display:block;margin-bottom:6px">Full Name</label>
          <input name="name" value="${user.name || ''}" required
            style="width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--glass-border);border-radius:var(--r-md);color:var(--text-1);padding:10px 14px;font-size:.9rem;outline:none;"/>
        </div>
        <div>
          <label style="font-size:.8rem;color:var(--text-3);display:block;margin-bottom:6px">Phone</label>
          <input name="phone" value="${user.phone || ''}" placeholder="Optional"
            style="width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--glass-border);border-radius:var(--r-md);color:var(--text-1);padding:10px 14px;font-size:.9rem;outline:none;"/>
        </div>
        <div>
          <label style="font-size:.8rem;color:var(--text-3);display:block;margin-bottom:6px">Nickname</label>
          <input name="nickname" value="${user.nickname || ''}" placeholder="Optional"
            style="width:100%;box-sizing:border-box;background:var(--bg3);border:1px solid var(--glass-border);border-radius:var(--r-md);color:var(--text-1);padding:10px 14px;font-size:.9rem;outline:none;"/>
        </div>
        <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:8px;">
          <button type="button" id="cancel-edit-btn"
            style="padding:10px 20px;background:transparent;border:1px solid var(--glass-border);border-radius:var(--r-full);color:var(--text-3);cursor:pointer;font-size:.875rem;">
            Cancel
          </button>
          <button type="submit" id="save-edit-btn"
            style="padding:10px 20px;background:var(--gradient);border:none;border-radius:var(--r-full);color:#fff;font-weight:700;cursor:pointer;font-size:.875rem;">
            Save Changes
          </button>
        </div>
      </form>
    </div>`;

  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  document.getElementById('cancel-edit-btn').addEventListener('click', () => modal.remove());

  document.getElementById('edit-profile-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const btn = document.getElementById('save-edit-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const updated = await updateMe({
        name:     fd.get('name') || undefined,
        phone:    fd.get('phone') || undefined,
        nickname: fd.get('nickname') || undefined,
      });
      // Update sessionStorage with new user data
      const stored = JSON.parse(sessionStorage.getItem('hv_user') || '{}');
      sessionStorage.setItem('hv_user', JSON.stringify({ ...stored, ...updated }));
      modal.remove();
      showToast('Profile updated', 'success');
      renderProfile();
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false; btn.textContent = 'Save Changes';
    }
  });
}

renderProfile();
</script>

</body>
</html>

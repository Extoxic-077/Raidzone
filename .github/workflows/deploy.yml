name: Production & Staging Deploy (Docker)

on:
  push:
    branches:
      - master
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IS_PROD: ${{ github.ref == 'refs/heads/master' }}
      # We will deploy everything to a single project folder
      PROJECT_PATH: ${{ github.ref == 'refs/heads/master' && '~/raidzone-prod' || '~/raidzone-staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync Code to Server
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" \
            --exclude '.git' \
            --exclude 'node_modules' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.PROJECT_PATH }}/

      - name: Deploy via Docker Compose
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            cd ${{ env.PROJECT_PATH }}
            
            # Use docker-compose (with hyphen) for older versions, or docker compose
            (docker-compose -f docker-compose.prod.yml build --no-cache && docker-compose -f docker-compose.prod.yml up -d) || \
            (docker compose -f docker-compose.prod.yml build --no-cache && docker compose -f docker-compose.prod.yml up -d)
            
            # Run migration inside the container
            docker exec raidzone-backend node scripts/migrate-attributes.js || echo "Migration failed"
            
            # Flush Redis
            docker exec raidzone-redis redis-cli flushall || redis-cli flushall || echo "Redis flush failed"
          ENDSSH

      - name: Verify & Reload aaPanel Nginx
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            # Target the actual aaPanel Nginx binary and config
            echo "🔍 Finding Nginx includes..."
            grep "include" /www/server/nginx/conf/nginx.conf || echo "No includes found"
            
            echo "🔍 Listing /www/wwwroot content..."
            ls -l /www/wwwroot || echo "/www/wwwroot not found"

            sudo /www/server/nginx/sbin/nginx -t -c /www/server/nginx/conf/nginx.conf
            sudo /www/server/nginx/sbin/nginx -s reload -c /www/server/nginx/conf/nginx.conf
          ENDSSH

name: Deploy to Google Cloud

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SECRET_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SECRET_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SECRET_STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SECRET_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          SECRET_STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SECRET_RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          SECRET_RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
          SECRET_RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          SECRET_COINBASE_API_KEY: ${{ secrets.COINBASE_API_KEY }}
          SECRET_COINBASE_WEBHOOK_SECRET: ${{ secrets.COINBASE_WEBHOOK_SECRET }}
          SECRET_MAIL_USER: ${{ secrets.MAIL_USER }}
          SECRET_MAIL_PASS: ${{ secrets.MAIL_PASS }}
          SECRET_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          SECRET_GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          SECRET_DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          SECRET_DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
        run: |
          ssh ${SSH_USER}@${SSH_HOST} bash -s << 'ENDSSH'
            set -e

            echo "=== Pulling latest code ==="
            cd ~/nexvault
            git reset --hard HEAD
            git pull origin master

            echo "=== Building backend ==="
            cd ~/nexvault/backend
            ./mvnw clean package -DskipTests -q

            echo "=== Stopping old backend ==="
            pkill -f "backend-0.0.1-SNAPSHOT.jar" || true
            sleep 5

            echo "=== Writing .env from secrets ==="
            cd ~/nexvault
          ENDSSH

          # Write .env separately so secrets expand on the GitHub Actions runner (not on server)
          ssh ${SSH_USER}@${SSH_HOST} bash << ENVSSH
            set -e
            cd ~/nexvault

            cat > .env << 'ENVEOF'
# ── Server ────────────────────────────────────
PORT=8080

# ── Database ──────────────────────────────────
DB_HOST=localhost
DB_PORT=5432
DB_NAME=nexvault
DB_USER=nexvault
ENVEOF

            echo "DB_PASSWORD=${SECRET_DB_PASSWORD}" >> .env

            cat >> .env << 'ENVEOF'

# ── Redis ─────────────────────────────────────
REDIS_HOST=localhost
REDIS_PORT=6379

# ── JWT ───────────────────────────────────────
ENVEOF

            echo "JWT_SECRET=${SECRET_JWT_SECRET}" >> .env

            cat >> .env << 'ENVEOF'

# ── CORS ──────────────────────────────────────
CORS_ALLOWED_ORIGINS=http://34.131.255.177

# ── Upload ────────────────────────────────────
UPLOAD_DIR=/home/$(whoami)/nexvault/uploads

# ── Stripe ────────────────────────────────────
ENVEOF

            echo "STRIPE_SECRET_KEY=${SECRET_STRIPE_SECRET_KEY}" >> .env
            echo "STRIPE_PUBLISHABLE_KEY=${SECRET_STRIPE_PUBLISHABLE_KEY}" >> .env
            echo "STRIPE_WEBHOOK_SECRET=${SECRET_STRIPE_WEBHOOK_SECRET}" >> .env

            cat >> .env << 'ENVEOF'

# ── Razorpay ──────────────────────────────────
ENVEOF

            echo "RAZORPAY_KEY_ID=${SECRET_RAZORPAY_KEY_ID}" >> .env
            echo "RAZORPAY_KEY_SECRET=${SECRET_RAZORPAY_KEY_SECRET}" >> .env
            echo "RAZORPAY_WEBHOOK_SECRET=${SECRET_RAZORPAY_WEBHOOK_SECRET}" >> .env

            cat >> .env << 'ENVEOF'

# ── Coinbase ──────────────────────────────────
ENVEOF

            echo "COINBASE_API_KEY=${SECRET_COINBASE_API_KEY}" >> .env
            echo "COINBASE_WEBHOOK_SECRET=${SECRET_COINBASE_WEBHOOK_SECRET}" >> .env

            cat >> .env << 'ENVEOF'

# ── Mail ──────────────────────────────────────
ENVEOF

            echo "MAIL_USER=${SECRET_MAIL_USER}" >> .env
            echo "MAIL_PASS=${SECRET_MAIL_PASS}" >> .env

            cat >> .env << 'ENVEOF'

# ── OAuth2 ────────────────────────────────────
OAUTH_REDIRECT_BASE_URL=http://34.131.255.177
ENVEOF

            echo "GOOGLE_CLIENT_ID=${SECRET_GOOGLE_CLIENT_ID}" >> .env
            echo "GOOGLE_CLIENT_SECRET=${SECRET_GOOGLE_CLIENT_SECRET}" >> .env
            echo "DISCORD_CLIENT_ID=${SECRET_DISCORD_CLIENT_ID}" >> .env
            echo "DISCORD_CLIENT_SECRET=${SECRET_DISCORD_CLIENT_SECRET}" >> .env

            echo "=== .env written successfully ==="
            grep -v "SECRET\|PASSWORD\|KEY\|PASS\|TOKEN" .env || true
          ENVSSH

          # Start the application with all env vars sourced from .env
          ssh ${SSH_USER}@${SSH_HOST} bash << 'STARTSSH'
            set -e
            cd ~/nexvault

            # Source .env and export all variables
            set -a
            source .env
            set +a

            mkdir -p uploads

            echo "=== Starting backend ==="
            nohup java \
              -jar backend/target/backend-0.0.1-SNAPSHOT.jar \
              --server.port=${PORT:-8080} \
              --spring.datasource.url="jdbc:postgresql://${DB_HOST:-localhost}:${DB_PORT:-5432}/${DB_NAME:-nexvault}" \
              --spring.datasource.username="${DB_USER:-nexvault}" \
              --spring.datasource.password="${DB_PASSWORD}" \
              --spring.data.redis.host="${REDIS_HOST:-localhost}" \
              --spring.data.redis.port="${REDIS_PORT:-6379}" \
              --app.jwt.secret="${JWT_SECRET}" \
              --app.cors.allowed-origins="${CORS_ALLOWED_ORIGINS}" \
              --app.upload.dir="${UPLOAD_DIR:-./uploads}" \
              --app.stripe.secret-key="${STRIPE_SECRET_KEY:-sk_test_placeholder}" \
              --app.stripe.publishable-key="${STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}" \
              --app.stripe.webhook-secret="${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}" \
              --app.razorpay.key-id="${RAZORPAY_KEY_ID:-rzp_test_placeholder}" \
              --app.razorpay.key-secret="${RAZORPAY_KEY_SECRET:-placeholder}" \
              --app.razorpay.webhook-secret="${RAZORPAY_WEBHOOK_SECRET:-placeholder}" \
              --app.coinbase.api-key="${COINBASE_API_KEY:-placeholder}" \
              --app.coinbase.webhook-secret="${COINBASE_WEBHOOK_SECRET:-placeholder}" \
              --spring.mail.username="${MAIL_USER:-placeholder@gmail.com}" \
              --spring.mail.password="${MAIL_PASS:-placeholder}" \
              --app.oauth.google.client-id="${GOOGLE_CLIENT_ID:-placeholder}" \
              --app.oauth.google.client-secret="${GOOGLE_CLIENT_SECRET:-placeholder}" \
              --app.oauth.discord.client-id="${DISCORD_CLIENT_ID:-placeholder}" \
              --app.oauth.discord.client-secret="${DISCORD_CLIENT_SECRET:-placeholder}" \
              --app.oauth.redirect-base-url="${OAUTH_REDIRECT_BASE_URL:-http://34.131.255.177}" \
              > ~/app.log 2>&1 &

            echo "=== Waiting 45s for Spring Boot to initialize ==="
            sleep 45

            echo "=== Health check ==="
            curl -f http://localhost:8080/actuator/health || { echo "Health check FAILED"; cat ~/app.log | tail -50; exit 1; }

            echo "=== DB connectivity check ==="
            curl -f http://localhost:8080/api/v1/categories || { echo "Categories check FAILED"; exit 1; }

            echo ""
            echo "=== Deploy successful! Backend running at http://34.131.255.177:8080 ==="
          STARTSSH

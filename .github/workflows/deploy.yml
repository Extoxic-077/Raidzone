name: Production & Staging Deploy

on:
  push:
    branches:
      - master
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IS_PROD: ${{ github.ref == 'refs/heads/master' }}
      BASE_PATH: ${{ github.ref == 'refs/heads/master' && '/var/www' || '/var/www/staging' }}
      BACKEND_PATH: ${{ github.ref == 'refs/heads/master' && '~/raidzone/backend' || '~/raidzone-staging/backend' }}
      PORT: ${{ github.ref == 'refs/heads/master' && '5000' || '5001' }}
      PM2_NAME: ${{ github.ref == 'refs/heads/master' && 'raidzone-api' || 'raidzone-api-staging' }}
      RELEASE_ID: ${{ github.run_id }}_${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install --production

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare Release Directories
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            mkdir -p ${{ env.BASE_PATH }}/frontend/releases/${{ env.RELEASE_ID }}
            mkdir -p ${{ env.BASE_PATH }}/admin/releases/${{ env.RELEASE_ID }}
            mkdir -p ${{ env.BACKEND_PATH }}
          "

      - name: Deploy Backend
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" --exclude 'node_modules' ./backend/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.BACKEND_PATH }}/

      - name: Backend Post-Deploy (Migrate & Restart)
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e
            cd ${{ env.BACKEND_PATH }}
            npm install --production
            
            # Safe migration
            node scripts/migrate-attributes.js || echo "Migration failed, continuing anyway..."

            # Restart named PM2 process
            PORT=${{ env.PORT }} NODE_ENV=production pm2 restart ${{ env.PM2_NAME }} --update-env || PORT=${{ env.PORT }} NODE_ENV=production pm2 start server.js --name ${{ env.PM2_NAME }}
          ENDSSH

      - name: Deploy Frontend & Admin (Atomic Release)
        run: |
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519" ./frontend/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.BASE_PATH }}/frontend/releases/${{ env.RELEASE_ID }}/
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519" ./frontend/admin/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.BASE_PATH }}/admin/releases/${{ env.RELEASE_ID }}/

      - name: Switch Symlinks (Zero Downtime)
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            ln -sfn ${{ env.BASE_PATH }}/frontend/releases/${{ env.RELEASE_ID }} ${{ env.BASE_PATH }}/frontend/current
            ln -sfn ${{ env.BASE_PATH }}/admin/releases/${{ env.RELEASE_ID }} ${{ env.BASE_PATH }}/admin/current
            sudo nginx -t && sudo systemctl reload nginx
          "

      - name: Cleanup Old Releases
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ${{ env.BASE_PATH }}/frontend/releases && ls -t | tail -n +6 | xargs rm -rf -- || true
            cd ${{ env.BASE_PATH }}/admin/releases && ls -t | tail -n +6 | xargs rm -rf -- || true
          "

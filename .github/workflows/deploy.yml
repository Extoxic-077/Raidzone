name: Production & Staging Deploy (Docker)

on:
  push:
    branches:
      - master
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IS_PROD: ${{ github.ref == 'refs/heads/master' }}
      # We will deploy everything to a single project folder
      PROJECT_PATH: ${{ github.ref == 'refs/heads/master' && '~/raidzone-prod' || '~/raidzone-staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare Project Directory
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ${{ env.PROJECT_PATH }}"

      - name: Sync Code to Server
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" \
            --exclude '.git' \
            --exclude 'node_modules' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.PROJECT_PATH }}/

      - name: Deploy via Docker Compose
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            cd ${{ env.PROJECT_PATH }}
            
            # Rebuild and restart containers
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d
            
            # DEBUG: Where are the files?
            echo "🔍 Locating products.html on server..."
            find /var/www -name "products.html" | xargs ls -l || echo "Not found in /var/www"
            find /home -name "products.html" | xargs ls -l || echo "Not found in /home"
            
            # Run migration inside the container
            docker exec raidzone-backend node scripts/migrate-attributes.js || echo "Migration failed"
            
            # Flush Redis (if running on host or in docker)
            redis-cli flushall || docker exec raidzone-redis redis-cli flushall || echo "Redis flush failed"
          ENDSSH

      - name: Verify Nginx Routing
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            # Ensure host Nginx points to the Docker ports (8081 for backend, 3000 for frontend)
            # We'll apply a hardened config if needed, but for now we trust the existing setup
            sudo nginx -t && sudo systemctl reload nginx
          ENDSSH

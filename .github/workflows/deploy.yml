name: Deploy to Google Cloud

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── SSH setup ────────────────────────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      # ── Write .env with all secrets onto the server ──────────────────────────
      # Uses printf 'KEY=%s\n' 'VALUE' — single-quoted value survives shell
      # metacharacters (!, $, etc.) that might appear in API keys / passwords.
      # ${{ secrets.* }} is expanded by GitHub Actions before the shell runs.
      - name: Write .env to server
        run: |
          {
            echo "# Auto-generated by GitHub Actions — do not edit manually"

            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=5432"
            echo "DB_NAME=nexvault"
            echo "DB_USER=nexvault"
            printf 'DB_PASSWORD=%s\n' '${{ secrets.DB_PASSWORD }}'

            echo "REDIS_HOST=127.0.0.1"
            echo "REDIS_PORT=6379"

            printf 'JWT_SECRET=%s\n' '${{ secrets.JWT_SECRET }}'

            echo "CORS_ALLOWED_ORIGINS=https://nexvault.digital"

            printf 'MAIL_USERNAME=%s\n' '${{ secrets.MAIL_USERNAME }}'
            printf 'MAIL_PASSWORD=%s\n' '${{ secrets.MAIL_PASSWORD }}'
            printf 'MAIL_FROM=%s\n'     '${{ secrets.MAIL_FROM }}'

            printf 'GOOGLE_CLIENT_ID=%s\n'     '${{ secrets.GOOGLE_CLIENT_ID }}'
            printf 'GOOGLE_CLIENT_SECRET=%s\n' '${{ secrets.GOOGLE_CLIENT_SECRET }}'
            printf 'DISCORD_CLIENT_ID=%s\n'    '${{ secrets.DISCORD_CLIENT_ID }}'
            printf 'DISCORD_CLIENT_SECRET=%s\n' '${{ secrets.DISCORD_CLIENT_SECRET }}'
            echo "OAUTH_REDIRECT_BASE_URL=https://nexvault.digital"

            printf 'STRIPE_SECRET_KEY=%s\n'      '${{ secrets.STRIPE_SECRET_KEY }}'
            printf 'STRIPE_PUBLISHABLE_KEY=%s\n' '${{ secrets.STRIPE_PUBLISHABLE_KEY }}'
            printf 'STRIPE_WEBHOOK_SECRET=%s\n'  '${{ secrets.STRIPE_WEBHOOK_SECRET }}'

            printf 'RAZORPAY_KEY_ID=%s\n'        '${{ secrets.RAZORPAY_KEY_ID }}'
            printf 'RAZORPAY_KEY_SECRET=%s\n'    '${{ secrets.RAZORPAY_KEY_SECRET }}'
            printf 'RAZORPAY_WEBHOOK_SECRET=%s\n' '${{ secrets.RAZORPAY_WEBHOOK_SECRET }}'

            printf 'COINBASE_API_KEY=%s\n'        '${{ secrets.COINBASE_API_KEY }}'
            printf 'COINBASE_WEBHOOK_SECRET=%s\n' '${{ secrets.COINBASE_WEBHOOK_SECRET }}'

            # $HOME expands on the server when the file is sourced — not here
            echo 'UPLOAD_DIR=$HOME/nexvault-uploads'
          } > /tmp/nexvault.env

          scp /tmp/nexvault.env "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/nexvault/.env"
          rm -f /tmp/nexvault.env

      # ── Main deploy ───────────────────────────────────────────────────────────
      # Single-quoted 'ENDSSH' → bash variables like ${DB_HOST} are NOT expanded
      # locally; they are expanded on the remote server after `source .env`.
      - name: Deploy to server
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'ENDSSH'
            set -e

            # ── Pull latest code ────────────────────────────────────────────────
            echo "=== Pulling latest code ==="
            cd ~/nexvault
            git reset --hard HEAD
            git pull origin master

            # ── Build backend ───────────────────────────────────────────────────
            echo "=== Building backend ==="
            cd ~/nexvault/backend
            ./mvnw clean package -DskipTests

            # ── Stop old backend ────────────────────────────────────────────────
            echo "=== Stopping old backend ==="
            pkill -f "backend-0.0.1-SNAPSHOT.jar" || true
            sleep 3

            # ── Ensure upload directory exists ──────────────────────────────────
            mkdir -p "$HOME/nexvault-uploads"

            # ── Load all secrets from .env ──────────────────────────────────────
            set -a
            source ~/nexvault/.env
            set +a

            # ── Start backend ───────────────────────────────────────────────────
            echo "=== Starting backend ==="
            cd ~/nexvault
            nohup java -jar backend/target/backend-0.0.1-SNAPSHOT.jar \
              --spring.datasource.url="jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}" \
              --spring.datasource.username="${DB_USER}" \
              --spring.datasource.password="${DB_PASSWORD}" \
              --spring.data.redis.host="${REDIS_HOST}" \
              --spring.data.redis.port="${REDIS_PORT}" \
              --spring.mail.username="${MAIL_USERNAME}" \
              --spring.mail.password="${MAIL_PASSWORD}" \
              --app.jwt.secret="${JWT_SECRET}" \
              --app.cors.allowed-origins="${CORS_ALLOWED_ORIGINS}" \
              --app.oauth.google.client-id="${GOOGLE_CLIENT_ID}" \
              --app.oauth.google.client-secret="${GOOGLE_CLIENT_SECRET}" \
              --app.oauth.discord.client-id="${DISCORD_CLIENT_ID}" \
              --app.oauth.discord.client-secret="${DISCORD_CLIENT_SECRET}" \
              --app.oauth.redirect-base-url="${OAUTH_REDIRECT_BASE_URL}" \
              --app.stripe.secret-key="${STRIPE_SECRET_KEY}" \
              --app.stripe.publishable-key="${STRIPE_PUBLISHABLE_KEY}" \
              --app.stripe.webhook-secret="${STRIPE_WEBHOOK_SECRET}" \
              --app.razorpay.key-id="${RAZORPAY_KEY_ID}" \
              --app.razorpay.key-secret="${RAZORPAY_KEY_SECRET}" \
              --app.razorpay.webhook-secret="${RAZORPAY_WEBHOOK_SECRET}" \
              --app.coinbase.api-key="${COINBASE_API_KEY}" \
              --app.coinbase.webhook-secret="${COINBASE_WEBHOOK_SECRET}" \
              --app.upload.dir="$HOME/nexvault-uploads" \
              --management.health.mail.enabled=false \
              --server.port=8080 \
              > ~/app.log 2>&1 &

            # ── Wait and health-check ───────────────────────────────────────────
            echo "=== Waiting for backend to start (45s) ==="
            sleep 45

            curl -sf http://localhost:8080/actuator/health \
              || { echo "HEALTH CHECK FAILED"; tail -60 ~/app.log; exit 1; }

            curl -sf http://localhost:8080/api/v1/categories \
              || { echo "CATEGORIES CHECK FAILED"; tail -20 ~/app.log; exit 1; }

            echo "=== Deploy complete! https://nexvault.digital ==="
          ENDSSH

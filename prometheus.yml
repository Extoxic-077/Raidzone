global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: hashvault-backend
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: /actuator/prometheus

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

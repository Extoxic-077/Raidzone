version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: hashvault-db
    environment:
      POSTGRES_DB: nexvault
      POSTGRES_USER: nexvault
      POSTGRES_PASSWORD: nexvault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hashvault -d hashvault"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: hashvault-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

volumes:
  postgres_data:

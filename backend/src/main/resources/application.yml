spring:
  application:
    name: hashvault-backend

  # ── Datasource ──────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nexvault}
    username: ${DB_USER:nexvault}
    password: ${DB_PASSWORD:nexvault}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # ── Redis ───────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2000ms

  # ── Multipart (file uploads) ─────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  # ── Mail (Gmail SMTP) ────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:placeholder@gmail.com}
    password: ${MAIL_PASSWORD:placeholder}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ── Disable unused auto-configurations ───────────────────────────────────────
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  servlet:
    context-path: /

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

# ── App-specific settings ─────────────────────────────────────────────────────
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-that-is-at-least-32-characters-long-for-hmac-sha256}
    access-token-expiry: 900000       # 15 minutes in ms
    refresh-token-expiry: 604800000   # 7 days in ms
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    max-file-size: 5MB
    allowed-types: image/jpeg,image/png,image/webp,image/gif
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
    key-secret: ${RAZORPAY_KEY_SECRET:placeholder}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:placeholder}
  coinbase:
    api-key: ${COINBASE_API_KEY:placeholder}
    webhook-secret: ${COINBASE_WEBHOOK_SECRET:placeholder}
  oauth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:placeholder}
      client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
    discord:
      client-id: ${DISCORD_CLIENT_ID:placeholder}
      client-secret: ${DISCORD_CLIENT_SECRET:placeholder}
    redirect-base-url: ${OAUTH_REDIRECT_BASE_URL:http://localhost:8080}
  otp:
    expiry-minutes: 10
    resend-cooldown-seconds: 60

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
  default-produces-media-type: application/json

version: '3.9'

services:

  # ── Backend (Node.js) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: raidzone-backend
    env_file: ./backend/.env.docker
    environment:
      NODE_ENV: production
      PORT: 8080
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8081:8080"
    networks:
      - default
      - raidzone_default
    restart: unless-stopped

  # ── Frontend (nginx) ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: raidzone-frontend
    environment:
      PORT: 3000
      API_URL: http://raidzone-backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads_data:

networks:
  raidzone_default:
    external: true
